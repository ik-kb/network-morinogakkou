{ heading:"WANは 遠くをむすぶ 大きな道", body:"はなれた場所どうしをむすぶ 広いネットワークを WAN(ワン)とよびます。\n\nWide Area Network = 広域のネットワーク。\n\n家のLANは、ルーターを通ってWANへ、そしてインターネットへ つながっています。", note:"ルーターは、LANとWANの「さかいめの門」に立っているんだ。" },
],
quiz:[
{ q:"コンピュータどうしをつなげたものを何とよぶ?", choices:["ネットワーク","パスワード","アルゴリズム"], answer:0, exp:"つなげるとデータを送りあえる。これがネットワークだよ。" },
{ q:"家や学校の中の せまいネットワークは?", choices:["WAN","LAN","CAN"], answer:1, exp:"LAN = Local Area Network。近くのなかよしグループだよ。" },
{ q:"はなれた場所をむすぶ 広いネットワークは?", choices:["LAN","WAN","RUN"], answer:1, exp:"WAN = Wide Area Network。遠くをむすぶ大きな道だよ。" },
{ q:"LANとWANのさかいめに立つ機械は?", choices:["ルーター","プリンター","スピーカー"], answer:0, exp:"ルーターが家の中(LAN)と外の世界(WAN)の橋わたしをするよ。" },
{ q:"インターネットを一言でいうと?", choices:["ネットワークのネットワーク","1台の巨大コンピュータ","電話線の別名"], answer:0, exp:"世界中のネットワークがつながりあった、網の目の集合体だよ。" },
{ q:"家のWi-Fiにつながったスマホとゲーム機の関係は?", choices:["同じLANのなかま","別のWANどうし","つながっていない"], answer:0, exp:"同じルーターの下にいる機器は、同じLANのなかまだよ。" },
]},
{ id:"2-2", grade:2, chapter:"2ねんせい だい2しょう", title:"IPアドレスの正体", teacher:"rutamogura", teacherName:"るーたーもぐら先生",
slides:[
{ heading:"ネットの世界の じゅうしょ", body:"データを届けるには、あて先が必要です。\n\nネットワークにつながる機器には、1台1台に「IPアドレス」という じゅうしょがふられます。\n\nれい:192.168.1.5\n\n0〜255の数字が 4つ、ピリオドで区切られて ならんでいます。", note:"この形式をIPv4とよぶよ。ぜんぶで32ビットぶんの数字なんだ。" },
{ heading:"グローバルとプライベート", body:"IPアドレスには 2しゅるいあります。\n\nグローバルIP:インターネット全体で使う、世界にひとつだけの住所\nプライベートIP:家や学校の中だけで使う、内輪の住所\n\n192.168.〜 で始まる住所は、プライベートIPの代表です。", note:"家の中の住所は、となりの家とかぶってもOK。内輪だけで通じればいいからね。" },
{ heading:"住所が足りない! IPv6", body:"IPv4で作れる住所は 約43億こ。多そうに見えて、世界の機器の数には足りません。\n\nそこで生まれたのが IPv6。けたを大きく増やして、ほぼ無限に住所を作れるようにしました。\n\n今は IPv4とIPv6が併用されています。", note:"IPv6の住所は 2001:db8::1 のように16進数で書くよ。見た目もずいぶん違うね。" },
],
quiz:[
{ q:"ネットワーク上の機器の「じゅうしょ」は?", choices:["IPアドレス","メールアドレス","ホームアドレス"], answer:0, exp:"データのあて先になる番号。1台1台にふられるよ。" },
{ q:"IPv4アドレスの正しい形は?", choices:["192.168.1.5","192-168-1","http://192"], answer:0, exp:"0〜255の数字4つをピリオドで区切った形だよ。" },
{ q:"IPv4の各数字の範囲は?", choices:["0〜99","0〜255","1〜1000"], answer:1, exp:"8ビットで表せるのが0〜255。1年生の2進数の知識とつながるね。" },
{ q:"家や学校の中だけで使う住所は?", choices:["グローバルIP","プライベートIP","パブリックIP"], answer:1, exp:"192.168.〜などのプライベートIPは内輪専用。よその家とかぶってもOKだよ。" },
{ q:"IPv6が生まれた理由は?", choices:["IPv4の住所が足りなくなったから","速度が遅かったから","名前がかっこ悪かったから"], answer:0, exp:"IPv4は約43億こしか作れない。IPv6でほぼ無限になったよ。" },
{ q:"世界にひとつだけの住所は?", choices:["プライベートIP","グローバルIP","ローカルIP"], answer:1, exp:"インターネット全体で通じる住所がグローバルIPだよ。" },
]},
{ id:"2-3", grade:2, chapter:"2ねんせい だい3しょう", title:"サブネットマスクと「けたわけ」", teacher:"rutamogura", teacherName:"るーたーもぐら先生",
slides:[
{ heading:"じゅうしょを 大きい組と 小さい番号に わける", body:"IPアドレス(れい:192.168.1.5)は、コンピュータの じゅうしょです。\n\nこの じゅうしょは じつは 2つの部分でできています。\n\n「どの教室か」を表す部分(ネットワーク部)と、\n「教室の中の 何番か」を表す部分(ホスト部)です。", note:"同じ教室(ネットワーク)にいる子どうしだけが、かんたんに おしゃべりできるよ。" },
{ heading:"サブネットマスクは しきり線", body:"でも、じゅうしょの数字だけを見ても、どこまでが「教室」で どこからが「番号」かは わかりません。\n\nそこで使うのが サブネットマスクです。\n\nたとえば 255.255.255.0 のような数字が、\n「ここまでが教室、ここからが番号だよ」と 教えてくれる しきり線の役目をします。", note:"マスク(mask)は「かくす」という意味。番号の部分をかくして、教室だけを見せてくれるよ。" },
{ heading:"2進数で見ると しきりがわかる", body:"1年生でならった 2進数を つかうと、しきりがはっきり見えます。\n\n255 を2進数にすると 11111111(1が8こ)。\n0 を2進数にすると 00000000(0が8こ)。\n\nマスクの「1」のところが 教室(ネットワーク部)、\n「0」のところが 番号(ホスト部)を表します。", note:"255.255.255.0 は 1が24こ、0が8こ ならんでいる、ということだよ。" },
{ heading:"「/24」という書きかた(CIDR)", body:"1が24こ ならんでいることを、いちいち 255.255.255.0 と書くのは 大変です。\n\nそこで「1がいくつ ならんでいるか」の数字だけを使って、\n192.168.1.0/24\nのように 書くこともあります。\n\nこれを CIDR(サイダー)記法と よびます。", note:"/24 の「24」は、しきり線が左から24番目にある、という意味だよ。" },
{ heading:"けいさんしてみよう", body:"192.168.1.0/24 の場合、\n教室の部分が24ビット、番号の部分が のこり8ビットです。\n\n8ビットで表せる番号は 2×2×2×2×2×2×2×2 = 256とおり。\n\nつまり この教室には 256人ぶんの じゅうしょが 用意できる、ということです。", note:"じっさいは 0番と255番は特別な役目があるので、使えるのは254人ぶんだよ。くわしくは また今度!" },
],
quiz:[
{ q:"IPアドレスの中で「どの教室か」を表す部分を 何とよぶ?", choices:["ネットワーク部","ホスト部","マスク部"], answer:0, exp:"「どの教室か」= ネットワーク部。「教室の中の何番か」= ホスト部だよ。" },
{ q:"サブネットマスクの役目は?", choices:["じゅうしょを 教室部分と番号部分に わける しきり線","じゅうしょを あんごうにする しくみ","じゅうしょを 自動でわりあてる しくみ"], answer:0, exp:"サブネットマスクは、じゅうしょの どこまでが教室で どこからが番号かを 教えるしきり線だよ。" },
{ q:"255を2進数にすると?", choices:["00000000","11111111","10101010"], answer:1, exp:"255は 1が8こならんだ 11111111 だよ。" },
{ q:"サブネットマスクの「1」のぶぶんが表しているのは?", choices:["ネットワーク部(教室)","ホスト部(番号)","エラーの場所"], answer:0, exp:"マスクの「1」のところが ネットワーク部(教室)を表すよ。" },
{ q:"255.255.255.0 を「1のかず」で表すと?", choices:["/8","/16","/24"], answer:2, exp:"255.255.255.0 は 1が24こならんでいるから /24 だよ。" },
{ q:"192.168.1.0/24 のような書きかたを 何とよぶ?", choices:["CIDR記法","ASCII記法","16進記法"], answer:0, exp:"「/24」のように 1のかずで表す書きかたを CIDR(サイダー)記法と よぶよ。" },
{ q:"/24のとき、番号(ホスト部)は 何ビット のこる?", choices:["8ビット","16ビット","24ビット"], answer:0, exp:"ぜんぶで32ビットのうち 24ビットが教室部分なので、のこり 32-24=8ビットが番号部分だよ。" },
{ q:"8ビットぶんの番号で 表せる とおり数は?", choices:["8とおり","100とおり","256とおり"], answer:2, exp:"2を8回かけると(2の8乗) 256とおりに なるよ。" },
{ q:"同じ教室(ネットワーク)にいるかどうかを 決めるのに 使うものは?", choices:["サブネットマスク","パスワード","コンピュータの名前"], answer:0, exp:"サブネットマスクを使って じゅうしょを見くらべると、同じ教室かどうかが わかるよ。" },
]},
{ id:"2-4", grade:2, chapter:"2ねんせい だい4しょう", title:"DNSのしくみ", teacher:"dnsjii", teacherName:"でぃーえぬえすじい先生",
slides:[
{ heading:"名前と じゅうしょ", body:"わしらは「example.com」のような名前(ドメイン名)でサイトにアクセスするが、コンピュータが本当に使うのは IPアドレスじゃ。\n\n名前 → じゅうしょ の変換をしてくれるのが DNS(ドメインネームシステム)。\n\nいわば、ネットの世界の 電話帳係じゃよ。", note:"わし、でぃーえぬえすじいの名前は ここから来ておるんじゃ。" },
{ heading:"ドメイン名は 右から読む", body:"ドメイン名は、うしろ(右)ほど 大きなくくりになっています。\n\nwww.example.co.jp なら…\njp = 日本\nco = 会社\nexample = 会社の名前\nwww = その中のサーバー名\n\n住所を「国→県→市」と書くのに似ていますね。", note:"いちばん右の「jp」「com」などをトップレベルドメインとよぶよ。" },
{ heading:"キャッシュで はやく", body:"毎回 電話帳を最初から調べるのは大変なので、一度調べた答えは しばらく手元にメモしておきます。\n\nこのメモを「キャッシュ」とよびます。\n\nキャッシュがあれば すぐ答えられますが、古くなったメモで まちがえることも…。", note:"わしが たまに古い住所を答えてしまうのは、キャッシュのせいなんじゃよ…。" },
],
quiz:[
{ q:"DNSのやくわりは?", choices:["名前をIPアドレスに変換する","データを暗号化する","ウイルスをけす"], answer:0, exp:"example.comのような名前から、IPアドレスを調べる電話帳係だよ。" },
{ q:"example.com のような名前を何とよぶ?", choices:["ドメイン名","ニックネーム","ファイル名"], answer:0, exp:"人間がおぼえやすい、ネット上の名前がドメイン名だよ。" },
{ q:"www.example.co.jp で「日本」を表す部分は?", choices:["www","example","jp"], answer:2, exp:"ドメイン名は右ほど大きなくくり。jpは日本を表すよ。" },
{ q:"一度調べた答えをメモしておくしくみは?", choices:["キャッシュ","キャッチ","カット"], answer:0, exp:"キャッシュがあると次から速い。でも古くなることもあるよ。" },
{ q:"DNSがないと どうなる?", choices:["IPアドレスを直接おぼえる必要がある","インターネットが速くなる","何も変わらない"], answer:0, exp:"名前が使えないと、数字の住所を暗記することに…。DNSさまさまだね。" },
{ q:"「jp」「com」のような右はしの部分を何とよぶ?", choices:["トップレベルドメイン","ファーストドメイン","キングドメイン"], answer:0, exp:"いちばん右がトップレベルドメイン(TLD)。国や種類を表すよ。" },
]},
{ id:"2-5", grade:2, chapter:"2ねんせい だい5しょう", title:"HTTP/HTTPSの通信", teacher:"paketto", teacherName:"ぱけっとちゃん先生",
slides:[
{ heading:"リクエストと レスポンス", body:"Webページを見るとき、ブラウザとサーバーは おきまりの会話をしています。\n\nブラウザ「このページください!」(リクエスト)\nサーバー「はい、どうぞ!」(レスポンス)\n\nこの会話のルールが HTTP です。", note:"ルール(約束ごと)のことを「プロトコル」とよぶよ。だいじな言葉!" },
{ heading:"URLを 分解してみよう", body:"https://www.example.com/news/index.html\n\nhttps: → 会話のルール(プロトコル)\nwww.example.com → サーバーの名前\n/news/index.html → サーバーの中の ファイルの場所\n\nURLは「どこの、どのファイルを、どのルールでもらうか」を表しています。", note:"URLの読み方がわかると、あやしいサイトを見破る力もつくよ。" },
{ heading:"HTTPSの「S」は まもりのS", body:"HTTPのままだと、通信の中身が だれかに のぞき見される心配があります。\n\nそこで、通信を暗号化したのが HTTPS。SはSecure(安全)のSです。\n\nブラウザのアドレス欄に かぎマークが出ていたら、HTTPSで守られているしるしです。", note:"今はほとんどのサイトがHTTPS。かぎマークをチェックするくせをつけよう。" },
],
quiz:[
{ q:"ブラウザが「ページください」と頼むことを何とよぶ?", choices:["リクエスト","レスポンス","リサイクル"], answer:0, exp:"頼むのがリクエスト、返すのがレスポンスだよ。" },
{ q:"通信の約束ごとを何とよぶ?", choices:["プロトコル","プロフィール","プログラム"], answer:0, exp:"HTTPもIPも、みんなプロトコル(約束ごと)の名前だよ。" },
{ q:"HTTPSの「S」の意味は?", choices:["Speed(速い)","Secure(安全)","Special(特別)"], answer:1, exp:"通信を暗号化して守るのがHTTPS。SはSecureのSだよ。" },
{ q:"HTTPSで守られているしるしは?", choices:["ブラウザのかぎマーク","画面が青くなる","音が鳴る"], answer:0, exp:"アドレス欄のかぎマークが暗号化のしるしだよ。" },
{ q:"URLの「https://」の部分が表すものは?", choices:["プロトコル","サーバー名","ファイル名"], answer:0, exp:"先頭は「どのルールで会話するか」。プロトコルの指定だよ。" },
{ q:"HTTPのままだと何が心配?", choices:["中身をのぞき見される","パソコンが重くなる","画像が表示されない"], answer:0, exp:"暗号化されていないと、とちゅうで通信をのぞかれる心配があるよ。" },
]},
{ id:"2-6", grade:2, chapter:"2ねんせい だい6しょう", title:"OSI参照モデルという地図", teacher:"dnsjii", teacherName:"でぃーえぬえすじい先生",
slides:[
{ heading:"通信を 7つの層に分けた地図", body:"ネットワークの通信は、じつは たくさんの仕事の積み重ねです。\n\nそこで、仕事を7つの層(レイヤ)に分けて整理した地図が「OSI参照モデル」です。\n\n下の層ほど 機械に近く、上の層ほど 人間に近い仕事をします。", note:"層に分けると「どこの話をしているか」が伝わりやすくなるんじゃ。" },
{ heading:"7つの層を ざっくり見る", body:"下から順に…\n\n1. 物理層:ケーブルや電気信号\n2. データリンク層:となりの機器への受け渡し\n3. ネットワーク層:住所(IP)で遠くへ届ける\n4. トランスポート層:確実さの管理(TCPなど)\n5〜7. セッション/プレゼンテーション/アプリケーション層:アプリの世界(HTTPなど)", note:"ぜんぶ暗記しなくてOK。「下=機械寄り、上=アプリ寄り」がつかめれば十分じゃ。" },
{ heading:"分けると 分たんできる", body:"層に分ける最大のメリットは、やくわり分たんです。\n\nケーブルの会社、ルーターの会社、アプリの会社が、それぞれ自分の層だけを考えて作れる。\n\nだから世界中のちがう機器どうしでも、通信がつながるのです。", note:"じっさいのインターネットでは、OSIをかんたんにした「TCP/IP 4階層モデル」もよく使われるぞ。" },
],
quiz:[
{ q:"OSI参照モデルは通信をいくつの層に分けている?", choices:["3つ","7つ","100こ"], answer:1, exp:"7つの層(レイヤ)に分けた地図だよ。" },
{ q:"いちばん下(第1層)は?", choices:["物理層","アプリケーション層","ネットワーク層"], answer:0, exp:"第1層はケーブルや電気信号の世界。いちばん機械寄りだよ。" },
{ q:"IPアドレスで遠くへ届けるのは第何層?", choices:["第1層","第3層","第7層"], answer:1, exp:"第3層のネットワーク層。IPはここの住人だよ。" },
{ q:"HTTPが働くのはどのあたり?", choices:["下の層(機械寄り)","上の層(アプリ寄り)","層の外"], answer:1, exp:"HTTPはアプリケーション層。人間に近い上の層だよ。" },
{ q:"層に分ける最大のメリットは?", choices:["やくわり分たんできる","通信が無料になる","暗号が不要になる"], answer:0, exp:"層ごとに別の会社が作っても、つなげば動く。これが分たんの力だよ。" },
{ q:"OSIをかんたんにした実用モデルは?", choices:["TCP/IP 4階層モデル","USB 2階層モデル","HTML 5階層モデル"], answer:0, exp:"実際のインターネットではTCP/IPモデルもよく使われるよ。" },
]},

{ id:"3-1", grade:3, chapter:"3ねんせい だい1しょう", title:"Webサーバーの正体", teacher:"paketto", teacherName:"ぱけっとちゃん先生",
slides:[
{ heading:"サーバーは「サービスする係」", body:"サーバー(server)は「サービスを提供する係」という意味です。\n\nWebサーバーは、Webページを配るのが仕事。ブラウザからリクエストが来たら、たのまれたページ(HTMLファイルなど)を送り返します。\n\nレストランでいうと、注文を受けて料理を運ぶ 給仕さんですね。", note:"リクエストする側(ブラウザなど)は「クライアント」とよぶよ。" },
{ heading:"サーバーも ただのコンピュータ", body:"サーバーは特別な魔法の箱ではなく、サーバー用のソフトが動いている コンピュータです。\n\n有名なWebサーバーソフトには Apache(アパッチ)や nginx(エンジンエックス)があります。\n\n24時間ずっと動き続けるのが、ふつうのパソコンとの大きなちがいです。", note:"きみのパソコンでも、ソフトを入れればWebサーバーになれるんだよ。" },
{ heading:"クライアントサーバー方式", body:"「たのむ側(クライアント)」と「こたえる側(サーバー)」に分かれて仕事をするしくみを、クライアントサーバー方式とよびます。\n\nWebだけでなく、メールもゲームも、ネットのサービスの多くが この形で動いています。", note:"1台のサーバーが、何千人ものクライアントの相手をすることもあるんだ。" },
],
quiz:[
{ q:"Webサーバーの仕事は?", choices:["たのまれたWebページを送り返す","ウイルスを配る","パスワードを考える"], answer:0, exp:"リクエストを受けてページを返す。レストランの給仕さんだよ。" },
{ q:"サーバーに「ページください」とたのむ側を何とよぶ?", choices:["クライアント","マスター","オーナー"], answer:0, exp:"たのむ側がクライアント、こたえる側がサーバーだよ。" },

{ heading:"表(テーブル)で 管理する", body:"よく使われるデータベースは、データを表の形で持ちます。\n\nユーザー表:名前 | レベル | コイン\nぴんごろう | 5 | 120\nぱけっと | 8 | 300\n\nこの表を「テーブル」、横1行を「レコード」とよびます。", note:"表の形で管理するDBを「リレーショナルデータベース」とよぶよ。" },

{ q:"データベースへのお願いに使う言葉は?", choices:["SQL","URL","LOL"], answer:0, exp:"SELECT文などのSQLで、探す・追加するなどをお願いするよ。" },
{ q:"表の形でデータを管理するDBを何とよぶ?", choices:["リレーショナルデータベース","エモーショナルデータベース","ミュージカルデータベース"], answer:0, exp:"表(リレーション)で管理するからリレーショナル。いちばん広く使われているよ。" },
{ q:"データベースを管理するソフトを何とよぶ?", choices:["DBMS","DVD","BGM"], answer:0, exp:"DataBase Management System = DBMS だよ。" },
{ q:"メモ帳よりデータベースが強いところは?", choices:["探す・並べるが超高速","字がきれい","音楽が聞ける"], answer:0, exp:"100万件から一瞬で探せる。これがDBの本領だよ。" },
]},
{ id:"3-3", grade:3, chapter:"3ねんせい だい3しょう", title:"クラウドってどこにあるの?", teacher:"paketto", teacherName:"ぱけっとちゃん先生",
slides:[
{ heading:"クラウドの正体は データセンター", body:"「クラウドに保存」の クラウド(雲)は、空にデータがあるわけではありません。\n\n正体は、世界のどこかにある データセンター。何万台ものサーバーがならぶ 巨大な建物です。\n\nネット越しに borrowed(借りて)使うから、場所を意識しなくてすむのです。", note:"日本にもたくさんのデータセンターがあるよ。中は サーバーの森!" },
{ heading:"借りると 何がうれしい?", body:"自分でサーバーを買うと、置き場所・電気代・故障対応がぜんぶ自分の仕事。\n\nクラウドなら、必要な分だけ借りて、使った分だけ払えばOK。\n\n人気が出たら 借りる量を増やす、ひまなら減らす、が すぐできます。", note:"この「すぐ増減できる」性質をスケーラビリティとよぶよ。" },
{ heading:"借り方の3コース", body:"クラウドには 借り方のコースがあります。\n\nIaaS:機械だけ借りる(OSから自分で用意)\nPaaS:動かす土台まで借りる(アプリだけ自分で)\nSaaS:アプリごと借りる(すぐ使える)\n\nメールサービスやオンライン地図は SaaSの代表です。", note:"下に行くほど自由、上に行くほどお手軽。用途で選ぶんだ。" },
],
quiz:[
{ q:"クラウドの正体は?", choices:["データセンターのサーバー","空の上のデータ","雲の中の妖精"], answer:0, exp:"世界のどこかのデータセンターを、ネット越しに借りているんだよ。" },
{ q:"クラウドのうれしいところは?", choices:["使った分だけ払えばいい","雨の日は無料","雲の写真がもらえる"], answer:0, exp:"買わずに借りる。必要な分だけ、がクラウドの強みだよ。" },
{ q:"アプリごと借りてすぐ使えるコースは?", choices:["SaaS","IaaS","PaaS"], answer:0, exp:"Software as a Service。Webメールなどが代表だよ。" },
{ q:"機械だけ借りてOSから自分で用意するコースは?", choices:["IaaS","SaaS","BaaS"], answer:0, exp:"Infrastructure as a Service。いちばん自由度が高いコースだよ。" },
{ q:"借りる量をすぐ増減できる性質を何とよぶ?", choices:["スケーラビリティ","グラビティ","セレブリティ"], answer:0, exp:"人気が出たら増やす、ひまなら減らす。クラウドの得意技だよ。" },
{ q:"データセンターとは?", choices:["サーバーが大量にならぶ建物","データを売るお店","パソコン教室"], answer:0, exp:"何万台ものサーバーの森。クラウドのふるさとだよ。" },
]},
{ id:"3-4", grade:3, chapter:"3ねんせい だい4しょう", title:"TCPとUDP、2つの配達方法", teacher:"paketto", teacherName:"ぱけっとちゃん先生",
slides:[
{ heading:"確実さの TCP", body:"データの配達方法には、大きく2つの流儀があります。\n\nTCPは、確実さ重視の配達。\n「届いた?」「届いたよ!」と確認しあいながら送り、届かなかった荷物は 送り直します。\n\nWebページやメールなど、1文字も欠けてほしくないものに使われます。", note:"わたしたち配達係の、いちばん ていねいなお仕事モードだよ。" },
{ heading:"はやさの UDP", body:"UDPは、はやさ重視の配達。\n\n確認なしで どんどん投げるので、たまに荷物が落ちても 気にしません。\n\n動画配信や オンラインゲーム、通話など、「多少欠けても 止まらないこと」が大事なものに使われます。", note:"生放送で1コマ欠けても、送り直すより先に進むほうが自然だよね。" },
{ heading:"どちらも トランスポート層のなかま", body:"TCPもUDPも、OSI参照モデルでいう 第4層(トランスポート層)のプロトコルです。\n\nアプリの性質に合わせて、確実さのTCPか、はやさのUDPかを 使い分けています。\n\nつぎの章では、あて先を細かく分ける「ポート番号」を学びます。", note:"トランスポート=輸送。配達品質を管理する層なんだ。" },
],
quiz:[
{ q:"確認しあいながら確実に届ける配達方法は?", choices:["TCP","UDP","DVD"], answer:0, exp:"「届いた?」「届いたよ!」と確認し、だめなら送り直すのがTCPだよ。" },
{ q:"はやさ重視で確認なしの配達方法は?", choices:["TCP","UDP","OTP"], answer:1, exp:"どんどん投げるUDP。多少落ちても止まらないことが大事な場面用だよ。" },
{ q:"Webページの表示に使われるのは?", choices:["TCP","UDP","どちらでもない"], answer:0, exp:"1文字も欠けてほしくないWebやメールはTCPだよ。" },
{ q:"オンラインゲームや動画配信でよく使われるのは?", choices:["TCP","UDP","FAX"], answer:1, exp:"リアルタイム性が命の用途はUDPが向いているよ。" },
{ q:"TCPで荷物が届かなかったら?", choices:["送り直す","あきらめる","半分だけ送る"], answer:0, exp:"再送するのがTCPのえらいところ。だから確実なんだ。" },
{ q:"TCPとUDPはOSIモデルの第何層?", choices:["第1層","第4層","第7層"], answer:1, exp:"トランスポート層(第4層)。配達品質を管理する層だよ。" },
]},
{ id:"3-5", grade:3, chapter:"3ねんせい だい5しょう", title:"ポート番号という部屋番号", teacher:"firewall", teacherName:"ふぁいあうぉーるくん先生",
slides:[
{ heading:"IPアドレスだけでは 足りない", body:"IPアドレスは建物(コンピュータ)の住所。\n\nでも1台のコンピュータの中では、Web、メール、ゲームなど 複数のサービスが同時に動いています。\n\nどのサービスあての荷物かを区別する 部屋番号が「ポート番号」です。", note:"住所(IP)+部屋番号(ポート)で、はじめて荷物が正しく届く。" },
{ heading:"有名な部屋番号", body:"よく使うサービスの部屋番号は、世界共通で決まっています。\n\n80番:HTTP(Web)\n443番:HTTPS(暗号化Web)\n25番:SMTP(メール送信)\n53番:DNS\n\nこうした有名どころを ウェルノウンポートとよびます。", note:"0〜1023番がウェルノウンポート。番号は0〜65535まであるぞ。" },
{ heading:"門番は ポートを見張る", body:"使っていないポート(部屋)を開けっぱなしにすると、そこから侵入されるおそれがあります。\n\nだから わたしのようなファイアウォールが、「この部屋は開ける、この部屋は閉める」を管理するのです。\n\nいらない部屋は 閉めておく。それが守りの基本。", note:"5年生でわたしの本気の仕事ぶりを見せよう。" },
],
quiz:[
{ q:"1台の中のサービスを区別する番号は?", choices:["ポート番号","電話番号","マイナンバー"], answer:0, exp:"IPが住所、ポートが部屋番号。セットで荷物が届くよ。" },
{ q:"HTTPSが使う有名な部屋番号は?", choices:["443番","25番","1番"], answer:0, exp:"443番はHTTPS。80番のHTTPとセットでおぼえよう。" },
{ q:"HTTP(Web)の部屋番号は?", choices:["80番","8080万番","0番"], answer:0, exp:"80番がHTTPの定席。ウェルノウンポートの代表だよ。" },
{ q:"世界共通で決まった有名ポートを何とよぶ?", choices:["ウェルノウンポート","スーパーポート","ビッグポート"], answer:0, exp:"0〜1023番のよく知られた(well-known)ポートだよ。" },
{ q:"使わないポートはどうすべき?", choices:["閉めておく","ぜんぶ開ける","かざりをつける"], answer:0, exp:"開けっぱなしの部屋は侵入口になる。閉めるのが守りの基本だよ。" },
{ q:"ポート番号はいくつまである?", choices:["100まで","65535まで","無限"], answer:1, exp:"0〜65535番。16ビットで表せる数だよ(2進数の知識!)。" },
]},
{ id:"3-6", grade:3, chapter:"3ねんせい だい6しょう", title:"3ウェイハンドシェイクの挨拶", teacher:"pingoro", teacherName:"ぴんごろう先生",
slides:[
{ heading:"通信のまえの ごあいさつ", body:"TCPで通信を始めるまえには、かならず あいさつをします。\n\nおくる側「もしもーし!(SYN)」\nうける側「きこえるよ! そっちは?(SYN+ACK)」\nおくる側「きこえてる! はじめよう!(ACK)」\n\n3回のやりとりで つながるので、3ウェイハンドシェイクとよびます。", note:"ぼくの「おーい」も、へんじがあってこそ。あいさつはだいじ。" },
{ heading:"なぜ 3回も?", body:"1回目で「相手に届くこと」を、2回目で「相手からも届くこと」を、3回目で「おたがい確認できたこと」をたしかめています。\n\n双方向の通り道がちゃんとあるか、送る前に確認する。\n\nこれがTCPの確実さのひみつ、最初の一歩です。", note:"あいさつが成立してはじめて、データ本体の配達がはじまるよ。" },
{ heading:"おわりにも あいさつ", body:"通信のおわりにも、「もう送らないね(FIN)」「わかった(ACK)」というおわりのあいさつをします。\n\nはじまりも おわりも きちんとあいさつ。\n\nTCPはとても礼儀正しいプロトコルなのです。", note:"あいさつなしで急にいなくなるのは、通信の世界でも さみしいのだ。" },
],
quiz:[
{ q:"TCPが通信前に行うあいさつを何とよぶ?", choices:["3ウェイハンドシェイク","ハイタッチ","ラジオ体操"], answer:0, exp:"3回のやりとりで接続を確立するあいさつだよ。" },
{ q:"あいさつの1回目に送るものは?", choices:["SYN","FIN","PIN"], answer:0, exp:"SYN(もしもーし!)から始まるよ。" },
{ q:"2回目に相手が返すものは?", choices:["SYN+ACK","FIN+FIN","URL"], answer:0, exp:"「きこえるよ!そっちは?」= SYN+ACK だよ。" },
{ q:"なぜ3回もやりとりする?", choices:["双方向に届くことを確認するため","ひまだから","3が縁起のいい数字だから"], answer:0, exp:"行きも帰りも通じることを、送る前にたしかめているんだ。" },
{ q:"通信のおわりのあいさつで送るものは?", choices:["FIN","SYN","RUN"], answer:0, exp:"FIN(もう送らないね)でお別れのあいさつをするよ。" },
{ q:"3ウェイハンドシェイクをするのは?", choices:["TCPだけ","UDPだけ","両方"], answer:0, exp:"UDPはあいさつ抜きでいきなり投げる。あいさつするのはTCPだよ。" },
]},

{ id:"4-1", grade:4, chapter:"4ねんせい だい1しょう", title:"パスワードの守りかた", teacher:"angouneko", teacherName:"あんごうねこ先生",
slides:[
{ heading:"みじかいパスワードは 一瞬でやぶられる", body:"コンピュータは1秒間に何億回も パスワードの候補をためせます。\n\n「1234」や「password」のような定番は 一瞬でアウト。\n\n長さが1文字増えるごとに、やぶる時間はケタちがいに増えます。長さこそ正義!", note:"数字だけ4けたは1万とおりしかない。英数字まぜて12文字なら天文学的な数になるにゃ。" },
{ heading:"使い回しが いちばん危ない", body:"じつは、パスワードが破られる一番の原因は「使い回し」。\n\nどこかのサイトから流出したパスワードで、他のサイトにも侵入されるのです(パスワードリスト攻撃)。\n\nサイトごとに ちがうパスワードを使うのが鉄則です。", note:"覚えきれないぶんは、パスワード管理ツールにまかせるのが今のやり方にゃ。" },
{ heading:"2段階でまもる", body:"パスワードにくわえて、スマホに届く確認コードなどを使うのが 2段階認証。\n\nもしパスワードがばれても、2つ目の関門でくいとめられます。\n\nだいじなアカウントには かならず設定しておきましょう。", note:"認証のくわしい話は 4-6章でやるにゃ。おたのしみに。" },
],
quiz:[
{ q:"強いパスワードでいちばん大事なのは?", choices:["長さ","色","フォント"], answer:0, exp:"1文字増えるだけで破る時間がケタちがいに増える。長さこそ正義だよ。" },
{ q:"パスワードが破られる一番の原因は?", choices:["使い回し","長すぎ","漢字を使う"], answer:0, exp:"どこかで流出→他サイトでも試される(リスト攻撃)。使い回しが最大の穴だよ。" },
{ q:"パスワード+確認コードで守る方法は?", choices:["2段階認証","2度寝認証","ダブルクリック"], answer:0, exp:"2つ目の関門があれば、パスワードがばれてもくいとめられるよ。" },
{ q:"やってはいけないパスワードは?", choices:["password123","ランダムな12文字","記号まじりの長文"], answer:0, exp:"定番ワードは攻撃側の辞書に載っている。一瞬で破られるよ。" },
{ q:"たくさんのパスワードを覚えきれないときは?", choices:["管理ツールを使う","ぜんぶ同じにする","ふせんでモニタに貼る"], answer:0, exp:"使い回しや貼り紙はNG。管理ツールにまかせるのが現代流だよ。" },
{ q:"流出パスワードで他サイトを試す攻撃は?", choices:["パスワードリスト攻撃","ノック攻撃","くすぐり攻撃"], answer:0, exp:"使い回しをねらう攻撃。サイトごとに変えていれば防げるよ。" },
]},
{ id:"4-2", grade:4, chapter:"4ねんせい だい2しょう", title:"暗号化ってどういうこと?", teacher:"angouneko", teacherName:"あんごうねこ先生",
slides:[
{ heading:"読めなくしてから 渡す", body:"だいじな手紙を、そのまま送ると のぞき見されるかも。\n\nそこで、中身をぐちゃぐちゃにしてから送るのが「暗号化」。\n\nもとの文を平文(ひらぶん)、ぐちゃぐちゃ後を暗号文とよびます。もとに戻すことは「復号」といいます。", note:"わたしが手紙をぐちゃぐちゃにするのは、親切だったのにゃ。わかってくれた?" },
{ heading:"シーザー暗号で 体験", body:"古代ローマのシーザー暗号は、文字を決めた数だけ ずらす暗号です。\n\n3つずらすなら:ねこ → はし(五十音で3つずつ後ろへ)\n\n「いくつずらすか」を知っている人だけが もとに戻せます。この「いくつ」にあたる情報が 鍵(かぎ)です。", note:"ずらす数は50音ぶんしかないから、総当たりですぐ破れる。昔はこれで十分だったのにゃ。" },
{ heading:"現代の暗号は 数学のかたまり", body:"今の暗号(AESなど)は、コンピュータでも 現実的な時間では解けない 数学の問題を利用しています。\n\nHTTPSの通信も、この暗号技術で守られています。\n\n鍵を知らない人には ただのノイズ。鍵を持つ人だけが 意味を取り出せます。", note:"暗号の強さは「アルゴリズムの秘密」ではなく「鍵の秘密」で守るのが現代の考え方にゃ。" },
],
quiz:[
{ q:"暗号化するまえの もとの文を何とよぶ?", choices:["平文","作文","呪文"], answer:0, exp:"もとの文=平文、暗号化後=暗号文だよ。" },
{ q:"暗号文をもとに戻すことを何とよぶ?", choices:["復号","復習","復活"], answer:0, exp:"鍵を使ってもとに戻すのが復号だよ。" },
{ q:"文字をずらす古典暗号は?", choices:["シーザー暗号","カエサルサラダ","モールス信号"], answer:0, exp:"古代ローマ生まれの、ずらすだけのシンプルな暗号だよ。" },
{ q:"暗号をとくのに必要な「いくつずらすか」のような情報は?", choices:["鍵","扉","窓"], answer:0, exp:"鍵を知る人だけが復号できる。暗号の心臓部だよ。" },
{ q:"現代の暗号の強さは何で守る?", choices:["鍵の秘密","アルゴリズムの秘密","気合い"], answer:0, exp:"しくみは公開してもOK、鍵さえ秘密なら安全。これが現代流だよ。" },
{ q:"HTTPSを支えている技術は?", choices:["暗号化","圧縮","早口"], answer:0, exp:"通信を暗号化して、のぞき見からまもっているよ。" },
]},
{ id:"4-3", grade:4, chapter:"4ねんせい だい3しょう", title:"フィッシングを見破る", teacher:"angouneko", teacherName:"あんごうねこ先生",
slides:[
{ heading:"つりの「えさ」に注意", body:"フィッシング(phishing)は、本物そっくりの偽メールや偽サイトで、パスワードやカード番号を「釣り上げる」詐欺です。\n\n「アカウントが停止されます!今すぐこちらへ」\n\nこんな あせらせる文句が、つりばりの えさです。", note:"あせった魚ほど釣られやすい。まず深呼吸、が最大の防御にゃ。" },
{ heading:"見破るポイント", body:"あやしいと思ったら、ここをチェック。\n\n1. 送信元アドレスが 微妙に変(examp1e.comなど)\n2. リンク先URLが 公式とちがう\n3. 「今すぐ」「緊急」と あせらせてくる\n4. 日本語が 少し不自然\n\nひとつでも当てはまったら、リンクは踏まない。", note:"2-5章で学んだURLの読み方が、ここで武器になるにゃ!" },
{ heading:"正しい たしかめ方", body:"メールのリンクからは 開かない。\n\nそのかわり、ブックマークや公式アプリから 自分でアクセスして確認します。\n\n本当に大事なお知らせなら、公式サイトにも 必ず出ています。", note:"「リンクを踏まずに自分から行く」。この習慣だけで、被害の大半は防げるにゃ。" },
],
quiz:[
{ q:"偽サイトでパスワードを盗む詐欺を何とよぶ?", choices:["フィッシング","フェンシング","フィニッシュ"], answer:0, exp:"魚釣り(fishing)にかけた名前。えさに食いつかせる詐欺だよ。" },
{ q:"フィッシングメールの特徴は?", choices:["「今すぐ」とあせらせる","ていねいで正確な日本語","返信先がない"], answer:0, exp:"あせった人ほど釣られやすい。緊急を装うのが常套手段だよ。" },
{ q:"あやしいメールのリンクはどうする?", choices:["踏まずに公式から確認","とりあえず開く","友だちに転送"], answer:0, exp:"ブックマークや公式アプリから自分でアクセス。これが正解だよ。" },
{ q:"送信元「examp1e.com」があやしい理由は?", choices:["lが数字の1になっている","長すぎる","英語だから"], answer:0, exp:"本物そっくりに1文字だけ変える手口。じっくり見ないと気づけないよ。" },
{ q:"フィッシングへの最大の防御は?", choices:["あせらず深呼吸して確認","高速でクリック","メールを全部削除"], answer:0, exp:"あせりこそ敵。落ち着いて送信元とURLを確認しよう。" },
{ q:"本当に大事なお知らせの確認方法は?", choices:["公式サイトを直接見る","メールのリンクを信じる","うわさで判断"], answer:0, exp:"重要な連絡なら公式サイトにも必ず出ているよ。" },
]},
{ id:"4-4", grade:4, chapter:"4ねんせい だい4しょう", title:"共通鍵と公開鍵、2つの暗号", teacher:"angouneko", teacherName:"あんごうねこ先生",
slides:[
{ heading:"共通鍵暗号:同じ鍵を 2人で持つ", body:"共通鍵暗号は、閉めるのも開けるのも 同じ鍵を使う方式です。\n\n速くて軽いのが長所。AESが代表選手です。\n\nでも問題がひとつ。「その鍵を、どうやって相手に安全に渡す?」\n\n鍵を送る途中で盗まれたら、おしまいです。これを鍵配送問題とよびます。", note:"鍵をわたすための暗号に、また鍵がいる…無限ループにゃ!" },
{ heading:"公開鍵暗号:南京錠のアイデア", body:"公開鍵暗号は、鍵を2本のペアにした発明です。\n\n公開鍵 = 開いた南京錠。だれにでも配ってOK\n秘密鍵 = 南京錠を開ける鍵。自分だけが持つ\n\n相手は南京錠(公開鍵)で箱を閉めて送るだけ。開けられるのは 秘密鍵を持つ自分だけ。鍵を渡す必要がありません!", note:"RSAが有名にゃ。閉める鍵と開ける鍵が別、というのが革命だったのにゃ。" },
{ heading:"実際は 2つの合わせ技", body:"公開鍵暗号は安全だけど、計算がおそいのが弱点。\n\nそこでHTTPSでは、\n1. 最初のあいさつだけ公開鍵暗号で「共通鍵」を安全に共有\n2. そのあとの本番は 速い共通鍵暗号で\n\nという合わせ技(ハイブリッド方式)を使っています。", note:"適材適所にゃ。それぞれの長所だけを いいとこどり!" },
],
quiz:[
{ q:"閉めるのも開けるのも同じ鍵を使う方式は?", choices:["共通鍵暗号","公開鍵暗号","合鍵暗号"], answer:0, exp:"速いのが長所。AESが代表だよ。" },
{ q:"共通鍵暗号の弱点は?", choices:["鍵を安全に渡すのが難しい","おそすぎる","鍵が重い"], answer:0, exp:"鍵配送問題。渡す途中で盗まれたらおしまいだよ。" },
{ q:"公開鍵暗号で、だれにでも配ってよいのは?", choices:["公開鍵","秘密鍵","合鍵"], answer:0, exp:"公開鍵は開いた南京錠。配るだけなら安全だよ。" },
{ q:"公開鍵で暗号化したデータを復号できるのは?", choices:["対応する秘密鍵を持つ人","公開鍵を持つ全員","だれでも"], answer:0, exp:"南京錠を開けられるのは秘密鍵の持ち主だけだよ。" },
{ q:"公開鍵暗号の代表的なアルゴリズムは?", choices:["RSA","USB","RPG"], answer:0, exp:"RSAは公開鍵暗号の代表選手だよ。" },
{ q:"HTTPSが使う合わせ技は?", choices:["公開鍵で共通鍵を渡し、本番は共通鍵","ぜんぶ公開鍵","暗号なし"], answer:0, exp:"ハイブリッド方式。安全さと速さのいいとこどりだよ。" },
]},
{ id:"4-5", grade:4, chapter:"4ねんせい だい5しょう", title:"電子署名とハッシュ関数", teacher:"angouneko", teacherName:"あんごうねこ先生",
slides:[
{ heading:"ハッシュは データの指紋", body:"ハッシュ関数は、どんなデータからも 決まった長さの値(ハッシュ値)を作る計算です。\n\nおもしろい性質が3つ。\n1. 同じデータからは いつも同じ値\n2. 1文字でも変わると 値が大きく変わる\n3. 値から もとのデータには戻せない(一方向)\n\nまるで データの指紋です。", note:"パスワードもハッシュ値で保存するのが常識。生のまま保存はダメにゃ。" },
{ heading:"改ざんを 見やぶる", body:"ファイルと一緒にハッシュ値を渡しておけば、受け取った側は 自分でハッシュを計算して 見比べるだけで、改ざんチェックができます。\n\n値がちがえば、途中でだれかが 中身をいじった証拠。\n\n1文字の改ざんも 見逃しません。", note:"ダウンロードサイトに書いてある長い英数字、あれがハッシュ値にゃ。" },
{ heading:"電子署名 = 指紋 + 本人の鍵", body:"電子署名は、ハッシュ値を「秘密鍵」で暗号化して 文書にそえるしくみです。\n\n受け取った人は 送り主の「公開鍵」で開いて、ハッシュ値を照合。\n\n開けた → 本人が作った証拠(秘密鍵は本人しか持たない)\n値が一致 → 改ざんされていない証拠\n\n本人確認と改ざん検知が 一度にできます。", note:"4-4の公開鍵ペアを、暗号化とは逆向きに使うのがミソにゃ。" },
],
quiz:[
{ q:"データから決まった長さの「指紋」を作る計算は?", choices:["ハッシュ関数","マッシュ関数","ダッシュ関数"], answer:0, exp:"同じデータからはいつも同じ値。1文字変わると大きく変わるよ。" },
{ q:"ハッシュ値からもとのデータは?", choices:["戻せない","かんたんに戻せる","半分だけ戻せる"], answer:0, exp:"一方向の計算だから戻せない。これが大事な性質だよ。" },
{ q:"ハッシュ値の使いみちは?", choices:["改ざんチェック","データの圧縮","高速化"], answer:0, exp:"値を見比べるだけで、1文字の改ざんも見つけられるよ。" },
{ q:"電子署名でハッシュ値を暗号化するのに使う鍵は?", choices:["送り主の秘密鍵","送り主の公開鍵","受け取り側の鍵"], answer:0, exp:"本人しか持たない秘密鍵で署名するから、本人の証明になるんだよ。" },
{ q:"電子署名でわかることは?", choices:["本人が作ったことと改ざんがないこと","作った日の天気","ファイルの重さ"], answer:0, exp:"本人確認と改ざん検知、2つが一度にできる発明だよ。" },
{ q:"パスワードの正しい保存方法は?", choices:["ハッシュ値にして保存","生のまま保存","ふせんに書く"], answer:0, exp:"漏れても戻せないように、ハッシュ化して保存するのが常識だよ。" },
]},
{ id:"4-6", grade:4, chapter:"4ねんせい だい6しょう", title:"認証の3要素", teacher:"firewall", teacherName:"ふぁいあうぉーるくん先生",
slides:[
{ heading:"本人だと たしかめる3つの方法", body:"「あなたは本当に本人?」をたしかめることを 認証といいます。\n\n認証の材料は、大きく3種類。\n\n知識:本人だけが知っている(パスワード、暗証番号)\n所持:本人だけが持っている(スマホ、ICカード)\n生体:本人の体そのもの(指紋、顔)", note:"門番のわたしにとって、認証は仕事のかなめだ。" },
{ heading:"組み合わせると 強くなる", body:"ちがう種類を2つ以上組み合わせるのが 多要素認証(MFA)です。\n\nパスワード(知識)+ スマホの確認コード(所持)\n\n片方が破られても、もう片方でくいとめられる。\n\n同じ種類を2つ(パスワード2個など)は、多要素とは いいません。", note:"4-1で出てきた2段階認証も、この考え方の仲間だ。" },
{ heading:"それぞれの 長所と弱点", body:"知識:手軽だが、忘れる・盗まれる\n所持:強いが、なくす・壊れる\n生体:忘れないが、変更がきかない(指紋は取り替えられない!)\n\n完璧な方法はないからこそ、組み合わせて守るのです。", note:"守りは常に多重に。壁は1枚より2枚だ。" },
],
quiz:[
{ q:"認証の3要素は?", choices:["知識・所持・生体","名前・年齢・住所","朝・昼・夜"], answer:0, exp:"知っている・持っている・体そのもの、の3種類だよ。" },
{ q:"パスワードはどの要素?", choices:["知識","所持","生体"], answer:0, exp:"本人だけが知っている情報=知識要素だよ。" },
{ q:"指紋認証はどの要素?", choices:["生体","知識","所持"], answer:0, exp:"体そのものを使う生体要素だよ。" },
{ q:"多要素認証(MFA)とは?", choices:["ちがう種類を2つ以上組み合わせる","パスワードを2個使う","認証を2回くり返す"], answer:0, exp:"知識+所持のように、種類のちがうものを重ねるのがポイントだよ。" },
{ q:"生体認証の弱点は?", choices:["漏れても変更できない","すぐ忘れる","毎月お金がかかる"], answer:0, exp:"指紋は取り替えられない。だから他の要素との併用が大事だよ。" },
{ q:"パスワード+スマホの確認コードは?", choices:["多要素認証","単要素認証","無認証"], answer:0, exp:"知識+所持で2種類。りっぱな多要素認証だよ。" },
]},

{ id:"5-1", grade:5, chapter:"5ねんせい だい1しょう", title:"ファイアウォールという門番", teacher:"firewall", teacherName:"ふぁいあうぉーるくん先生",
slides:[
{ heading:"通信の門番、それがわたし", body:"ファイアウォールは、ネットワークの出入口に立ち、通信を通すか止めるかを判断する門番です。\n\n名前の由来は「防火壁」。火事(攻撃)が燃え広がるのを防ぐ壁、という意味です。\n\n外からの あやしい訪問者を、中に入れないのが第一の仕事。", note:"わたしの頭の炎は、この防火壁のほこりの象徴だ。" },
{ heading:"ルールブックで 判断する", body:"門番は 気分で判断しません。ルールにしたがいます。\n\nれい:\n・外から443番ポートへの通信 → 通す\n・外から3389番への通信 → 止める\n・中から外への通信 → 通す\n\n通信のあて先IP・ポート番号などを見て、パケット単位で判断することを パケットフィルタリングとよびます。", note:"3-5で学んだポート番号が、ここで守りの主役になる。" },
{ heading:"門番にも 限界がある", body:"ファイアウォールは万能ではありません。\n\n・許可した通信にまぎれた攻撃は通してしまう\n・中の人がひっかかるフィッシングは防げない\n\nだから、ウイルス対策・アップデート・人の注意力と 組み合わせて守ります。これを多層防御とよびます。", note:"壁は何枚も。わたし一人にまかせきりは禁物だ。" },
],
quiz:[
{ q:"ファイアウォールの仕事は?", choices:["通信を通すか止めるか判断する","部屋をあたためる","データを速くする"], answer:0, exp:"ネットワークの出入口に立つ門番だよ。" },
{ q:"ファイアウォールの判断基準は?", choices:["ルール(あて先IPやポート)","その日の気分","通信の色"], answer:0, exp:"決められたルールにしたがってパケットを通す/止めるよ。" },
{ q:"パケット単位で通信を検査するしくみは?", choices:["パケットフィルタリング","パケットラッピング","パケットショッピング"], answer:0, exp:"IPアドレスやポート番号を見て、1つ1つ判断するよ。" },
{ q:"ファイアウォールが防げないものは?", choices:["中の人がだまされるフィッシング","外からの不要な通信","閉じたポートへのアクセス"], answer:0, exp:"人の心のすきは壁では守れない。だから教育も大事なんだ。" },
{ q:"複数の守りを重ねる考え方は?", choices:["多層防御","一点集中","運まかせ"], answer:0, exp:"壁は1枚より2枚。FW+対策ソフト+人の注意で守るよ。" },
{ q:"ファイアウォールの名前の由来は?", choices:["防火壁","炎の魔法","熱い壁"], answer:0, exp:"火事(攻撃)の燃え広がりを防ぐ壁、という意味だよ。" },
]},
{ id:"5-2", grade:5, chapter:"5ねんせい だい2しょう", title:"脆弱性ってなに?", teacher:"firewall", teacherName:"ふぁいあうぉーるくん先生",
slides:[
{ heading:"プログラムの「弱点」", body:"脆弱性(ぜいじゃくせい)とは、プログラムにひそむ セキュリティ上の弱点のことです。\n\nどんなソフトも人間が作るもの。ミスや想定もれは必ず生まれます。\n\n攻撃者はこの弱点を見つけて、侵入や乗っ取りに悪用します。", note:"城の石垣の、ゆるんだ一石。そこが攻め口になる。" },
{ heading:"アップデートは 修理工事", body:"弱点が見つかると、開発元は修正プログラム(パッチ)を配ります。\n\nソフトの更新(アップデート)は、この修理工事を受け取る作業。\n\n「あとでやる」と放置した弱点こそ、攻撃者のねらい目です。更新はすぐに!", note:"更新通知はめんどうに見えて、実は城の修理のお知らせなのだ。" },
{ heading:"ゼロデイという きょうふ", body:"修正パッチが出るより先に、弱点が攻撃されることがあります。\n\nこれをゼロデイ攻撃とよびます。「対策できる日数がゼロ日」という意味です。\n\nだからこそ、1つの弱点で全滅しないよう、多層防御が大切なのです。", note:"完璧な城はない。だから見張りと多重の壁で備える。" },
],
quiz:[
{ q:"プログラムのセキュリティ上の弱点を何とよぶ?", choices:["脆弱性","柔軟性","可能性"], answer:0, exp:"ぜいじゃくせい。攻撃者にねらわれる弱点のことだよ。" },
{ q:"弱点を直す修正プログラムを何とよぶ?", choices:["パッチ","マッチ","タッチ"], answer:0, exp:"パッチ=つぎあて。アップデートで届けられるよ。" },
{ q:"アップデートを放置すると?", choices:["弱点が残り攻撃されやすい","速度が上がる","何も起きない"], answer:0, exp:"知られた弱点は格好のねらい目。更新はすぐやろう。" },
{ q:"パッチが出る前に攻撃されることを何とよぶ?", choices:["ゼロデイ攻撃","ワンデイ攻撃","ホリデイ攻撃"], answer:0, exp:"対策日数ゼロ日、の意味。もっとも防ぎにくい攻撃だよ。" },
{ q:"脆弱性が生まれる理由は?", choices:["人間が作るものだから","電気が強すぎるから","ネットが速いから"], answer:0, exp:"ミスや想定もれは必ず起きる。だから見つけて直し続けるんだ。" },
{ q:"更新通知が来たら?", choices:["はやめに更新する","ずっと無視する","端末を捨てる"], answer:0, exp:"更新=城の修理工事。はやいほど安全だよ。" },
]},
{ id:"5-3", grade:5, chapter:"5ねんせい だい3しょう", title:"インシデント対応のいろは", teacher:"firewall", teacherName:"ふぁいあうぉーるくん先生",
slides:[
{ heading:"事故は「起きるもの」として備える", body:"セキュリティの事故や その疑いを インシデントとよびます。\n\nウイルス感染、情報漏えい、不正アクセス…。\n\n現代の考え方は「事故はゼロにできない。起きたときに 被害を最小にする」。備えと手順がすべてです。", note:"火事と同じ。消火訓練をしている組織ほど、被害が小さい。" },
{ heading:"対応の流れ", body:"インシデント対応の基本の流れは…\n\n1. 検知・報告:気づいたら すぐ知らせる\n2. 封じ込め:ネットから切り離すなど、広がりを止める\n3. 復旧:安全を確認して もとに戻す\n4. 再発防止:原因を調べ、しくみを直す\n\nこの順番が命です。", note:"専門の対応チームをCSIRT(シーサート)とよぶよ。" },
{ heading:"いちばん大事なのは「すぐ報告」", body:"「怒られるかも」と隠すと、被害は広がる一方。\n\n変なメールを開いてしまった、へんな画面が出た…気づいた瞬間に報告するのが、最大の貢献です。\n\n報告した人を責めない文化が、強い組織を作ります。", note:"はやい報告は手柄だ。門番からのお願いでもある。" },
],
quiz:[
{ q:"セキュリティ事故やその疑いを何とよぶ?", choices:["インシデント","イベント","アクシデント休暇"], answer:0, exp:"感染・漏えい・不正アクセスなど、事故ぜんぱんを指すよ。" },
{ q:"インシデント対応で最初にやることは?", choices:["検知・報告","犯人さがし","パソコンを買い替える"], answer:0, exp:"まず気づいて知らせる。すべてはここから始まるよ。" },
{ q:"感染が疑われる端末への正しい初動は?", choices:["ネットから切り離す","再起動をくり返す","そのまま使い続ける"], answer:0, exp:"封じ込め。広がりを止めるのが先決だよ。" },
{ q:"対応の最後にやることは?", choices:["再発防止","打ち上げ","記憶を消す"], answer:0, exp:"原因を調べ、しくみを直して次に備えるよ。" },
{ q:"インシデント対応の専門チームは?", choices:["CSIRT","CAST","CHART"], answer:0, exp:"シーサート。組織の消防団のような存在だよ。" },
{ q:"ミスに気づいたときの正しい行動は?", choices:["すぐ報告する","こっそり隠す","様子を見る"], answer:0, exp:"はやい報告が被害を最小にする。報告は手柄だよ。" },
]},
{ id:"5-4", grade:5, chapter:"5ねんせい だい4しょう", title:"マルウェアの種類", teacher:"firewall", teacherName:"ふぁいあうぉーるくん先生",
slides:[
{ heading:"わるいソフトの 総称", body:"悪意のあるソフトウェアをまとめて マルウェアとよびます。\n\n代表的な種類:\nウイルス:ほかのファイルにくっついて増える\nワーム:単独で ネット経由で自己増殖する\nトロイの木馬:便利なソフトのふりをして侵入する", note:"「ウイルス」は本当はマルウェアの一種。ニュースでは総称として使われがちだ。" },
{ heading:"身代金要求の ランサムウェア", body:"いま世界でもっとも被害が大きいのが ランサムウェア。\n\nファイルを勝手に暗号化して開けなくし、「戻してほしければ金を払え」と 身代金(ランサム)を要求します。\n\n対策の柱は、日ごろのバックアップ。人質を取られても、コピーがあれば怖くない。", note:"払っても戻る保証はない。バックアップこそ最強の保険だ。" },
{ heading:"感染経路と ふせぎ方", body:"おもな感染経路は…\n\n・メールの添付ファイルやリンク\n・あやしいサイトからのダウンロード\n・USBメモリ\n\n対策は、対策ソフト+アップデート+うかつに開かない習慣。4年生で学んだことが、ぜんぶつながります。", note:"敵の入口を知れば、守りはおのずと決まる。" },
],

{ id:"5-5", grade:5, chapter:"5ねんせい だい5しょう", title:"DoS/DDoS攻撃のしくみ", teacher:"pingoro", teacherName:"ぴんごろう先生",
slides:[
{ heading:"「おーい」も 大量だと 攻撃になる", body:"ぼくの「おーい(リクエスト)」は1回ならあいさつ。\n\nでも、何百万回も同時に浴びせたら…サーバーは返事に追われてパンクします。\n\nこうしてサービスを止める攻撃を DoS攻撃(サービス妨害攻撃)とよびます。", note:"量はときに凶器になる。ぼくの得意技の悪用形…かなしい。" },
{ heading:"DDoSは「分散」のD", body:"1台からの攻撃(DoS)なら、その相手だけ遮断すれば防げます。\n\nそこで攻撃者は、乗っ取った大量のコンピュータ(ボットネット)から一斉に攻撃します。\n\nこれが DDoS攻撃。Distributed(分散)のDが増えています。世界中から来るので、遮断がとてもむずかしい。", note:"きみのパソコンも、乗っ取られれば加害者側に…。だから対策ソフトが大事。" },
{ heading:"守る側の くふう", body:"DDoSへの守りは…\n\n・通信量の急増を監視して 異常をすばやく検知\n・専用の防御サービス(CDNなど)で 攻撃をさばく\n・あやしい通信の特徴をみつけて フィルタリング\n\n完全に防ぐのは難しく、「受け流す」発想が主流です。", note:"津波を止めるのではなく、逃がして散らす。そんなイメージだよ。" },
],
quiz:[
{ q:"大量のリクエストでサービスを止める攻撃は?", choices:["DoS攻撃","SOS攻撃","BGM攻撃"], answer:0, exp:"サービス妨害攻撃。返事に追われてサーバーがパンクするよ。" },
{ q:"DDoSの最初のDの意味は?", choices:["Distributed(分散)","Dangerous(危険)","Deep(深い)"], answer:0, exp:"大量のコンピュータから分散して攻撃するのがDDoSだよ。" },
{ q:"乗っ取られたコンピュータの群れを何とよぶ?", choices:["ボットネット","ロボット教室","ハチの巣"], answer:0, exp:"知らぬ間に加害者にされることも。対策ソフトで身を守ろう。" },
{ q:"DDoSがDoSより防ぎにくい理由は?", choices:["世界中から来るので遮断しにくい","音が大きい","夜しか来ない"], answer:0, exp:"1か所を止めても他から来る。分散のこわさだよ。" },
{ q:"DDoSへの現実的な守り方は?", choices:["専用サービスで受け流す","電源を抜いて祈る","攻撃し返す"], answer:0, exp:"完全に止めるより、さばいて散らす発想が主流だよ。" },
{ q:"通信量の急増に気づくために大事なのは?", choices:["日ごろの監視","強いパスワード","大きなモニタ"], answer:0, exp:"ふだんを知るから異常がわかる。監視は6-8章でくわしく!" },
]},
{ id:"5-6", grade:5, chapter:"5ねんせい だい6しょう", title:"SQLインジェクションとWebの穴", teacher:"angouneko", teacherName:"あんごうねこ先生",
slides:[
{ heading:"入力欄から 呪文をながしこむ", body:"3-2で学んだSQL、おぼえてる?\n\nSQLインジェクションは、Webサイトの入力欄に SQLの命令文をまぎれこませ、データベースを不正に操る攻撃です。\n\n名前の入力欄に「' OR '1'='1」のような呪文を入れると、作りの甘いサイトでは 認証がすりぬけられてしまうことも。", note:"injection=注入。入力欄は、サイトの口。口から毒を流しこむのにゃ。" },
{ heading:"なぜ 効いてしまうのか", body:"サイトの内部では、入力された文字を SQL文に はめこんで実行しています。\n\n入力をそのまま はめこむ作りだと、データのつもりが 命令として実行されてしまう。\n\nこれが インジェクションが刺さるしくみです。", note:"「データ」と「命令」の区別があいまいになるのが、事故のもとにゃ。" },
{ heading:"守り方は 「区別」を作ること", body:"対策の柱はこれ。\n\n・プレースホルダ(データと命令を最初から分けて渡すしくみ)を使う\n・入力チェック(想定外の文字をはじく)\n\n開発者の作り方ひとつで防げる攻撃です。ほかにも入力欄をねらう攻撃(XSSなど)がありますが、考え方は同じ。「入力を信用しない」。", note:"ユーザー入力は ぜんぶ疑え。Webセキュリティの合言葉にゃ。" },
],
quiz:[
{ q:"入力欄からSQL命令をまぎれこませる攻撃は?", choices:["SQLインジェクション","SQLダイエット","SQLマッサージ"], answer:0, exp:"injection=注入。データベースを不正に操る攻撃だよ。" },
{ q:"SQLインジェクションが効いてしまう原因は?", choices:["入力をそのままSQL文にはめこむ作り","パスワードが短い","サーバーが古い"], answer:0, exp:"データのつもりが命令として実行される。作りの問題だよ。" },
{ q:"対策の柱となる、データと命令を分けるしくみは?", choices:["プレースホルダ","プレイリスト","プラモデル"], answer:0, exp:"最初から別々に渡せば、呪文はただの文字列になるよ。" },
{ q:"Webセキュリティの合言葉は?", choices:["入力を信用しない","入力はぜんぶ信じる","入力欄を大きくする"], answer:0, exp:"ユーザー入力はぜんぶ疑う。これが基本姿勢だよ。" },
{ q:"SQLインジェクションで起こりうる被害は?", choices:["データベースの情報漏えい","画面が明るくなる","通信費が安くなる"], answer:0, exp:"個人情報の大量流出など、重大事故につながる攻撃だよ。" },
{ q:"入力欄をねらう別の攻撃の例は?", choices:["XSS","SSL","CSS"], answer:0, exp:"クロスサイトスクリプティング。考え方の根は同じ、入力を疑え!だよ。" },
]},

{ id:"6-1", grade:6, chapter:"せんこうか だい1しょう", title:"ルーティングのしくみ", teacher:"arupi_danuki", teacherName:"あーるぴーだぬき先輩",
slides:[
{ heading:"経路表という 地図帳", body:"ルーターは「この宛先なら こっちへ」という表を持っています。これがルーティングテーブル(経路表)ぽん。\n\n宛先ネットワーク → 次にわたす相手(ネクストホップ)\n\n荷物のあて先を見て、表と照らし合わせ、次のルーターへバトンタッチ。これのくり返しで、データは世界の果てまで届くぽん。", note:"1台で全部運ぶんじゃない。駅伝みたいにつなぐのがミソぽん。" },
{ heading:"デフォルトゲートウェイ", body:"表にない宛先が来たらどうする?\n\n「わからないものは、とりあえずこの人へ」という 最後のたのみ先が デフォルトゲートウェイぽん。\n\n家のパソコンにとっては、家のルーターがそれ。外の世界への出口ぽん。", note:"迷子の荷物の駆け込み寺、ともいえるぽん。" },
{ heading:"静的と動的", body:"経路表の作り方は2とおり。\n\n静的ルーティング:人間が手で書く。確実だが、変化に弱い\n動的ルーティング:ルーターどうしが情報交換して自動更新。道が壊れたら別の道を探す\n\n大きなネットワークでは動的が主流。ルーター同士の会話のルール(ルーティングプロトコル)もいろいろあるぽん。", note:"道路工事があっても回り道を見つける。ネットの強さのひみつぽん。" },
],
quiz:[
{ q:"ルーターが持つ「宛先→次の相手」の表は?", choices:["ルーティングテーブル","タイムテーブル","九九の表"], answer:0, exp:"経路表。荷物の行き先をこの表で決めるぽん。" },
{ q:"次にわたす相手のことを何とよぶ?", choices:["ネクストホップ","ネクストバッター","ジャンプ"], answer:0, exp:"駅伝の次の走者。ホップ=1区間のことだよ。" },
{ q:"表にない宛先のたのみ先は?", choices:["デフォルトゲートウェイ","ラスボス","交番"], answer:0, exp:"わからなければここへ。家庭では家のルーターがそれだよ。" },
{ q:"ルーターどうしが自動で経路情報を交換するのは?", choices:["動的ルーティング","静的ルーティング","運動的ルーティング"], answer:0, exp:"道が壊れても自動で回り道を発見。大規模ネットの主流だよ。" },
{ q:"人間が手で経路を書くのは?", choices:["静的ルーティング","動的ルーティング","詩的ルーティング"], answer:0, exp:"確実だけど変化に弱い。小さなネットワーク向けだよ。" },
{ q:"データが世界の果てに届くしくみは?", choices:["ルーターのバトンタッチのくり返し","1本の直通ケーブル","気合いと根性"], answer:0, exp:"駅伝方式。1区間ずつつないで地球の裏まで届くんだよ。" },
]},
{ id:"6-2", grade:6, chapter:"せんこうか だい2しょう", title:"スイッチとハブ、何が違う?", teacher:"switch_usagi", teacherName:"すいっちうさぎ先輩",
slides:[
{ heading:"ハブは 全員に くばる", body:"ハブは、届いたデータを つながっている全員にコピーしてばらまく機械です。\n\nかんたんだけど、関係ない子にも届くのでムダが多いし、のぞき見のリスクもあります。\n\n昔のLANはこれでした。", note:"「全員に回覧板」方式。にぎやかだけど非効率なの。" },
{ heading:"スイッチは 宛先だけに とどける", body:"スイッチは、どのポートの先に だれ(どのMACアドレス)がいるかを おぼえます。\n\nだから、宛先の子のポートにだけ データを送れる。\n\nムダがなく、はやく、のぞかれにくい。今のLANの主役です。", note:"わたしの耳のポート、ちゃんと1本1本おぼえてるんだから。" },
{ heading:"おぼえ方:MACアドレス学習", body:"スイッチは、届いたデータの「送り主」を見て、\n「このMACアドレスの子は このポートの先にいる」とメモしていきます。\n\nこれをMACアドレス学習とよびます。\n\n使いながら賢くなる、けなげな機械なのです。", note:"MACアドレスのくわしい話は、次の6-3章でやるよ。" },
],
quiz:[
{ q:"届いたデータを全員にばらまく機械は?", choices:["ハブ","スイッチ","ポンプ"], answer:0, exp:"全員に回覧板方式。かんたんだけどムダが多いよ。" },
{ q:"宛先のポートにだけデータを送る機械は?", choices:["スイッチ","ハブ","クラブ"], answer:0, exp:"宛先を見て届ける今のLANの主役だよ。" },
{ q:"スイッチが「だれがどのポートか」をおぼえることを何とよぶ?", choices:["MACアドレス学習","丸暗記","予習復習"], answer:0, exp:"送り主を見てメモしていく。使うほど賢くなるよ。" },
{ q:"ハブの弱点は?", choices:["関係ない相手にも届く","値段が高すぎる","音がうるさい"], answer:0, exp:"全員にコピーするからムダ+のぞき見リスクがあるよ。" },
{ q:"スイッチはOSIモデルでいうと第何層の機器?", choices:["第2層(データリンク層)","第5層","第7層"], answer:0, exp:"MACアドレスで働くから第2層。L2スイッチともよばれるよ。" },
{ q:"スイッチがハブよりはやい理由は?", choices:["ムダな送信をしないから","電力が強いから","ケーブルが太いから"], answer:0, exp:"宛先だけに送るから回線が混まない。効率の勝利だよ。" },
]},
{ id:"6-3", grade:6, chapter:"せんこうか だい3しょう", title:"MACアドレスとARP", teacher:"arupi_danuki", teacherName:"あーるぴーだぬき先輩",
slides:[
{ heading:"MACアドレスは 機械の背番号", body:"MACアドレスは、ネットワーク機器に工場出荷時からついている 世界で一意の番号ぽん。\n\nれい:00:1A:2B:3C:4D:5E\n\nIPアドレスが「引っ越しできる住所」なら、MACアドレスは「生まれつきの背番号」。基本的に変わらないぽん。", note:"48ビットの番号を16進数で書くぽん。前半は製造メーカーを表すんだよ。" },
{ heading:"IPとMAC、2つ必要なわけ", body:"遠くへ届けるための住所がIP、\nとなりの機器へ渡すための名札がMAC。\n\n6-1のバトンタッチを思い出して。区間ごとの受け渡しにはMACを使い、最終目的地はIPで示す。\n\n2つはやくわりが違うから、両方必要ぽん。", note:"宅配でいうと、IPが「届け先住所」、MACが「次の中継所の名前」ぽん。" },
{ heading:"ARP:IPからMACを調べる", body:"「192.168.1.5さんの MACアドレス教えてー!」\n\nと同じLAN内にさけぶ(ブロードキャスト)のが ARP ぽん。\n\n本人が「わたしのMACはこれだよ」と返事して、結果はARPテーブルにメモされる。\n\nぼくの名前(あーるぴー)は ここから来てるぽん!", note:"IPの世界とMACの世界の、通訳さんぽん。" },
],
quiz:[
{ q:"機器に工場出荷時からつく世界で一意の番号は?", choices:["MACアドレス","IPアドレス","マイナンバー"], answer:0, exp:"生まれつきの背番号。基本的に変わらないよ。" },
{ q:"IPアドレスからMACアドレスを調べるしくみは?", choices:["ARP","APP","AED"], answer:0, exp:"同じLAN内にさけんで本人の返事をもらう通訳さんだよ。" },
{ q:"となりの機器への受け渡しに使うのは?", choices:["MACアドレス","IPアドレス","郵便番号"], answer:0, exp:"区間の受け渡しはMAC、最終目的地はIP。役割分担だよ。" },
{ q:"ARPの問いかけ方法は?", choices:["LAN内全員にさけぶ(ブロードキャスト)","1人にささやく","手紙を書く"], answer:0, exp:"「〜のMAC教えて!」と全員に聞いて、本人が答えるしくみだよ。" },
{ q:"ARPの結果をメモしておく場所は?", choices:["ARPテーブル","冷蔵庫","ルーズリーフ"], answer:0, exp:"毎回さけばなくていいように、しばらくメモしておくよ。" },
{ q:"MACアドレスの前半からわかることは?", choices:["製造メーカー","持ち主の名前","値段"], answer:0, exp:"前半24ビットはメーカー識別子。機器の出身がわかるよ。" },
]},
{ id:"6-4", grade:6, chapter:"せんこうか だい4しょう", title:"VLANで教室をわける", teacher:"vlan_shimauma", teacherName:"VLANしまうま先輩",
slides:[
{ heading:"物理は同じ、論理でわける", body:"1台のスイッチにつながっていても、グループを分けたいことがあります。\n\n職員室グループと 生徒グループが、同じ機械の中で 別のネットワークとして動く。\n\nこれが VLAN(仮想LAN)。配線はそのまま、設定だけで教室をわけられるのです。", note:"わたしのしまもよう、色ごとに別のVLANなの。おしゃれでしょ。" },
{ heading:"何が うれしい?", body:"VLANのメリットは…\n\n・安全:グループ間の通信を制限できる(生徒から職員室のサーバーは見えない)\n・静か:ブロードキャスト(全員へのさけび声)がグループ内だけに収まる\n・柔軟:席替えしても 配線工事なしで設定変更だけ", note:"ARPのさけび声も、VLANの壁は越えられないの。" },
{ heading:"タグVLAN", body:"スイッチが複数あるとき、スイッチ間のケーブル1本に 複数のVLANの通信を混ぜて流したい。\n\nそこで、データに「これは10番教室の子」「これは20番教室の子」という 名札(タグ)をつけて運びます。\n\nこれがタグVLAN(IEEE 802.1Q)です。", note:"名札のおかげで、1本のろうかを何組もの生徒が行き来できるの。" },
],
quiz:[
{ q:"物理配線はそのまま、論理的にLANをわける技術は?", choices:["VLAN","ULAN","MILAN"], answer:0, exp:"仮想LAN。設定だけで教室をわけられるよ。" },
{ q:"VLANでわけると安全になる理由は?", choices:["グループ間の通信を制限できる","電気代が下がる","ケーブルが光る"], answer:0, exp:"生徒側から職員室のサーバーが見えない、が作れるよ。" },
{ q:"ブロードキャストのさけび声は?", choices:["VLANの中だけに収まる","世界中に届く","音速で飛ぶ"], answer:0, exp:"VLANの壁でさけびが収まるから、ネットワークが静かになるよ。" },
{ q:"スイッチ間で複数VLANを1本にまとめる技術は?", choices:["タグVLAN","ネームVLAN","シールVLAN"], answer:0, exp:"データに名札(タグ)をつけて運ぶ。802.1Qが規格名だよ。" },
{ q:"席替えのときVLANなら?", choices:["設定変更だけでOK","配線工事が必要","机ごと移動"], answer:0, exp:"物理配線をさわらず、設定で所属を変えられるのが強みだよ。" },
{ q:"VLANをわける主な機器は?", choices:["スイッチ","プリンター","スピーカー"], answer:0, exp:"VLAN対応スイッチの設定でグループをわけるよ。" },
]},
{ id:"6-5", grade:6, chapter:"せんこうか だい5しょう", title:"無線LANの規格と暗号化", teacher:"switch_usagi", teacherName:"すいっちうさぎ先輩",
slides:[
{ heading:"Wi-Fiと SSID", body:"ケーブルなしでLANにつなぐのが 無線LAN。Wi-Fiはその代表ブランド名です。\n\n電波の名前(アクセスポイントの名前)を SSID とよびます。\n\nスマホのWi-Fi設定に出てくる一覧、あれがSSIDのリストです。", note:"電波は壁を越えて飛ぶ。だからこそ、有線より守りが大事になるの。" },
{ heading:"規格は 世代で進化", body:"無線LANの規格はIEEE 802.11シリーズ。世代に名前がついています。\n\nWi-Fi 4(11n)→ Wi-Fi 5(11ac)→ Wi-Fi 6(11ax)\n\n新しいほど、はやく、混雑に強い。ルーターを選ぶときの目印になります。", note:"数字が大きい=新しい世代。おぼえ方はシンプル!" },
{ heading:"暗号化は WPA2/WPA3", body:"電波はだれでも受信できるので、暗号化が命綱です。\n\n現在の標準は WPA2、より新しいのが WPA3。\n\n古いWEPという方式は 数分で破られるので、絶対に使わない。\n\nお店の「パスワードなしWi-Fi」は暗号化なしのことも。だいじな通信は避けましょう。", note:"WEPしか使えない機器は、引退させてあげる時期なの。" },
],
quiz:[
{ q:"無線アクセスポイントの名前を何とよぶ?", choices:["SSID","SNS","SIM"], answer:0, exp:"Wi-Fi一覧に出てくる電波の名前がSSIDだよ。" },
{ q:"無線LAN規格のシリーズ名は?", choices:["IEEE 802.11","ISO 9001","JIS A4"], answer:0, exp:"802.11n/ac/axなどが世代の型番だよ。" },
{ q:"Wi-Fi 6にあたる規格は?", choices:["11ax","11ac","11n"], answer:0, exp:"n=4、ac=5、ax=6。新しいほどはやく混雑に強いよ。" },
{ q:"現在の無線暗号化の標準は?", choices:["WPA2/WPA3","WEP","ROT13"], answer:0, exp:"WPA2が標準、WPA3がより新しい方式だよ。" },
{ q:"絶対に使ってはいけない古い暗号方式は?", choices:["WEP","WPA3","AES"], answer:0, exp:"WEPは数分で破られる。見かけたら要注意だよ。" },
{ q:"パスワードなしの公衆Wi-Fiでの正しい行動は?", choices:["だいじな通信は避ける","ネットバンキングし放題","パスワードを共有する"], answer:0, exp:"暗号化なしの可能性がある。重要な操作は避けよう。" },
]},
{ id:"6-6", grade:6, chapter:"せんこうか だい6しょう", title:"誤り検出とパリティビット", teacher:"memoririsu", teacherName:"めもりーりす先生",
slides:[
{ heading:"データは 化けることがある", body:"通信のとちゅう、ノイズで 0が1に化けることがあります。\n\n「こんにちは」のつもりが「こんにちわ゛」に…。\n\nそこで、化けたことに気づくしくみ = 誤り検出が必要になります。", note:"化けたことに「気づける」だけでも、送り直せるから大助かりなの。" },
{ heading:"パリティビット:1の数で チェック", body:"いちばんシンプルな誤り検出が パリティビット。\n\nデータに1ビットおまけをつけて、「1の個数が偶数になるように」そろえます(偶数パリティ)。\n\n受け取った側は1を数えて、奇数だったら「あ、どこか化けた!」と気づけます。", note:"奇数にそろえる流儀(奇数パリティ)もあるよ。事前にどちらか決めておくの。" },
{ heading:"パリティの限界と その先", body:"パリティは、2ビット同時に化けると 見抜けません(偶数のまま!)。\n\nどこが化けたかも わからないので、訂正もできない。\n\n実際の通信では、より強力な CRC(巡回冗長検査)などが使われています。考え方の出発点として、パリティをおさえておきましょう。", note:"FE試験では偶数/奇数パリティの計算問題が定番なの。" },
],
quiz:[
{ q:"通信中にデータが化けることに気づくしくみは?", choices:["誤り検出","誤り隠し","誤り増幅"], answer:0, exp:"気づければ送り直せる。信頼性の第一歩だよ。" },
{ q:"1の個数をそろえるためのおまけの1ビットは?", choices:["パリティビット","ラッキービット","チョコビット"], answer:0, exp:"偶数(または奇数)になるようにそろえるチェック用ビットだよ。" },
{ q:"偶数パリティで「1011」に付けるビットは?", choices:["1","0","2"], answer:0, exp:"1が3こ(奇数)だから、1を足して4こ(偶数)にするよ。" },
{ q:"パリティビットで見抜けないのは?", choices:["2ビット同時の化け","1ビットの化け","化けなし"], answer:0, exp:"2つ化けると偶数のままなので気づけない。これが限界だよ。" },
{ q:"パリティビットにできないことは?", choices:["化けた場所の特定と訂正","化けたことへの気づき","偶数チェック"], answer:0, exp:"検出はできても訂正はできない。だからCRCなどが生まれたよ。" },
{ q:"実際の通信で使われる強力な誤り検出は?", choices:["CRC","CDC","CBC"], answer:0, exp:"巡回冗長検査。イーサネットなどで大活躍しているよ。" },
]},
{ id:"6-7", grade:6, chapter:"せんこうか だい7しょう", title:"伝送速度と帯域幅の計算", teacher:"rutamogura", teacherName:"るーたーもぐら先生",
slides:[
{ heading:"bpsという単位", body:"通信の速さは bps(ビット/秒)で表します。1秒間に何ビット運べるか、です。\n\n100Mbps = 1秒に1億ビット\n\n注意!ファイルサイズはバイト(B)、速度はビット(b)。\n1バイト = 8ビット。この換算がすべてのカギです。", note:"MB(メガバイト)とMb(メガビット)、大文字小文字で別物だよ。" },
{ heading:"転送時間の計算", body:"転送時間 = データ量 ÷ 速度\n\nれい:100MBのファイルを 100Mbpsの回線で送ると?\n\n1. バイトをビットに:100MB × 8 = 800Mビット\n2. わり算:800Mビット ÷ 100Mbps = 8秒\n\n「×8」を忘れないのがコツです。", note:"FE試験の超定番問題。この型をおぼえれば、もう解けるよ。" },
{ heading:"理論値と 実効速度", body:"「最大100Mbps」の回線でも、実際は もっとおそくなります。\n\nヘッダなどの荷札のぶんや、回線の混雑があるから。\n\n実際に出る速度を実効速度、回線の能力に対する利用率を伝送効率とよびます。\n\nれい:効率50%なら、実質50Mbpsで計算します。", note:"カタログの最大値は「理想の晴れの日」の数字。実際は割り引いて考えよう。" },
],
quiz:[
{ q:"通信速度の単位は?", choices:["bps","dpi","kg"], answer:0, exp:"1秒間に運べるビット数。bits per secondだよ。" },
{ q:"1バイトは何ビット?", choices:["8ビット","2ビット","100ビット"], answer:0, exp:"換算の基本。1年生からの積み重ねだね。" },
{ q:"100MBのファイルは何Mビット?", choices:["800Mビット","100Mビット","12.5Mビット"], answer:0, exp:"バイト→ビットは×8。100×8=800Mビットだよ。" },
{ q:"800Mビットを100Mbpsで送る時間は?", choices:["8秒","80秒","0.8秒"], answer:0, exp:"800÷100=8秒。データ量÷速度の型だよ。" },
{ q:"実際に出る速度を何とよぶ?", choices:["実効速度","理論速度","願望速度"], answer:0, exp:"混雑や荷札のぶんで理論値より下がる。それが現実の速度だよ。" },
{ q:"伝送効率50%の100Mbps回線の実質速度は?", choices:["50Mbps","100Mbps","200Mbps"], answer:0, exp:"100×0.5=50Mbps。効率をかけ算して考えるよ。" },
]},
{ id:"6-8", grade:6, chapter:"せんこうか だい8しょう", title:"ネットワーク監視とログ管理", teacher:"dnsjii", teacherName:"でぃーえぬえすじい先生",
slides:[
{ heading:"ログは 航海日誌", body:"サーバーや機器は、起きたことを記録に残しています。これがログじゃ。\n\nだれが いつ ログインした、どんな通信があった、エラーが出た…。\n\n事故のとき、ログがなければ 原因調査は闇の中。日ごろから記録し、保管しておくことが大切じゃ。", note:"5-3のインシデント対応も、ログがあってこそ進むのじゃよ。" },
{ heading:"監視:異常に はやく気づく", body:"監視とは、システムの健康状態を 常に見張ることじゃ。\n\n死活監視:生きてる?と定期的に確認(pingの出番!)\nリソース監視:CPUやメモリの使用率をチェック\n通信量監視:急なふくらみはDDoSの兆候かも\n\n「ふだん」を知るから、「異常」に気づける。", note:"ぴんごろうの「おーい」は、監視の世界の基本のあいさつなんじゃ。" },
{ heading:"SNMPと 時刻合わせ", body:"たくさんの機器の状態をまとめて集める約束ごとが SNMP じゃ。\n\nもうひとつ大事なのが 時刻合わせ(NTP)。\n\n機器ごとに時計がずれていると、ログをつなげて調べるとき、出来事の順番がわからなくなる。全員の時計を合わせておくのじゃ。", note:"探偵の捜査と同じ。時系列が命じゃよ。" },
],
quiz:[
{ q:"機器が残す記録を何とよぶ?", choices:["ログ","ブログ","カタログ"], answer:0, exp:"だれがいつ何をしたかの記録。調査の命づなだよ。" },
{ q:"「生きてる?」と定期確認する監視は?", choices:["死活監視","健康診断","出欠確認"], answer:0, exp:"pingなどで応答を確認する基本の監視だよ。" },
{ q:"通信量の急なふくらみから疑われるのは?", choices:["DDoS攻撃の兆候","豊作","回線のご機嫌"], answer:0, exp:"ふだんを知っていれば、異常なふくらみに気づけるよ。" },
{ q:"機器の状態をまとめて集める約束ごとは?", choices:["SNMP","SMTP","SNAP"], answer:0, exp:"ネットワーク監視の定番プロトコルだよ。" },
{ q:"機器の時計を合わせるしくみは?", choices:["NTP","NFT","MTG"], answer:0, exp:"時刻がずれるとログの順番がわからない。NTPで全員合わせるよ。" },
{ q:"ログを日ごろから保管する理由は?", choices:["事故時の原因調査のため","かさばるから","思い出づくり"], answer:0, exp:"インシデント対応はログがあってこそ。記録は財産だよ。" },
]},

{ id:"7-1", grade:7, chapter:"せんこうか だい9しょう", title:"冗長化という「予備」", teacher:"lb_kuma", teacherName:"ろーどばらんさーくま先輩",
slides:[
{ heading:"1つしかないものは いつか止まる", body:"サーバーも回線も、機械はいつか壊れます。\n\nそこで、あらかじめ予備を用意しておく考え方が 冗長化(じょうちょうか)です。\n\n2台あれば、1台が倒れても サービスは続く。\n\n「壊れないように」ではなく「壊れても止まらないように」作るのが、インフラ設計の心です。", note:"綱わたりでも命綱があれば安心。あれが冗長化クマ。" },
{ heading:"単一障害点を なくす", body:"そこが壊れると全体が止まる場所を、単一障害点(SPOF)とよびます。\n\nサーバーを2台にしても、電源が1系統なら 停電で全滅。\n\nサーバー、回線、電源、建物…どの層にも予備を。SPOFを探してつぶすのが設計者の腕の見せどころです。", note:"鎖の強さは いちばん弱い輪で決まる、というやつクマ。" },
{ heading:"ディスクの冗長化:RAID", body:"データをまもる冗長化の代表が RAID(レイド)。複数のディスクを組み合わせて、1台壊れてもデータが失われないようにします。\n\nRAID1(ミラーリング):2台に同じ内容を書く\nRAID5:データ+パリティを分散して書く\n\n6-6のパリティが、ここでも活躍します。", note:"RAIDはバックアップの代わりにはならない。まちがって消したら両方消えるクマ!" },
],
quiz:[
{ q:"予備を用意して止まらないようにする考え方は?", choices:["冗長化","高速化","小型化"], answer:0, exp:"壊れても止まらないように作る。インフラ設計の心だよ。" },
{ q:"そこが壊れると全体が止まる場所を何とよぶ?", choices:["単一障害点(SPOF)","集合場所","ボトルキープ"], answer:0, exp:"SPOFを探してつぶすのが設計の腕の見せどころだよ。" },
{ q:"2台のディスクに同じ内容を書くRAIDは?", choices:["RAID1","RAID0","RAID100"], answer:0, exp:"ミラーリング。片方が壊れてももう片方が生きているよ。" },
{ q:"RAID5で使われている誤り対策の考え方は?", choices:["パリティ","テレパシー","バッテリー"], answer:0, exp:"6-6で学んだパリティを分散して書き、復元を可能にするよ。" },
{ q:"サーバー2台でも停電で全滅する原因は?", choices:["電源が1系統(SPOF)","サーバーの相性","気温"], answer:0, exp:"どの層にも予備を。電源や回線もSPOFになりうるよ。" },
{ q:"RAIDで守れないのは?", choices:["まちがえて消したデータ","ディスク1台の故障","読み書きの継続"], answer:0, exp:"操作ミスは全ディスクに反映される。バックアップは別途必要だよ。" },
]},
{ id:"7-2", grade:7, chapter:"せんこうか だい10しょう", title:"負荷分散(ロードバランサ)", teacher:"lb_kuma", teacherName:"ろーどばらんさーくま先輩",
slides:[
{ heading:"アクセスを 分けあう", body:"人気サービスには、1台では さばききれない数のアクセスが来ます。\n\nそこで、サーバーを複数ならべて、アクセスをふりわける係を置きます。\n\nそれが ロードバランサ(負荷分散装置)。わたしの天びんは、この仕事の象徴クマ。", note:"load=荷物、balance=つりあい。荷物を公平に分ける係クマ。" },
{ heading:"ふりわけ方と 健康チェック", body:"ふりわけ方には いろいろあります。\n\nラウンドロビン:順ぐりに1台ずつ\n最小コネクション:今いちばんひまな子へ\n\nさらに大事なのが ヘルスチェック。各サーバーに「元気?」と定期確認して、倒れた子には ふりわけない。これで故障がユーザーに見えなくなります。", note:"死活監視(6-8)の考え方が、ここでも生きてるクマ。" },
{ heading:"スケールアップと スケールアウト", body:"処理能力を上げる方法は2つ。\n\nスケールアップ:1台を強くする(筋トレ型)\nスケールアウト:台数を増やす(なかま集め型)\n\nロードバランサがあれば、スケールアウトが自由自在。クラウド時代の主流は なかま集め型です。", note:"3-3のクラウドの「すぐ増減できる」と組み合わせると最強クマ。" },
],
quiz:[
{ q:"アクセスを複数サーバーにふりわける装置は?", choices:["ロードバランサ","ロードローラー","ロードマップ"], answer:0, exp:"荷物(load)をつりあい(balance)よく分ける係だよ。" },
{ q:"順ぐりに1台ずつふりわける方式は?", choices:["ラウンドロビン","ホームラン","ロックオン"], answer:0, exp:"順番にぐるぐる回す、いちばん素朴なふりわけ方だよ。" },
{ q:"サーバーに「元気?」と定期確認するしくみは?", choices:["ヘルスチェック","モーニングコール","点呼"], answer:0, exp:"倒れた子にはふりわけない。故障を隠す立役者だよ。" },
{ q:"1台を強くする増強方法は?", choices:["スケールアップ","スケールアウト","スケールダウン"], answer:0, exp:"筋トレ型。CPUやメモリを増強するよ。" },
{ q:"台数を増やす増強方法は?", choices:["スケールアウト","スケールアップ","スケールモデル"], answer:0, exp:"なかま集め型。クラウド時代の主流だよ。" },
{ q:"ロードバランサがあると故障時にどうなる?", choices:["元気なサーバーだけに送られ利用者は気づかない","全員にエラーが出る","音が鳴る"], answer:0, exp:"ヘルスチェック+ふりわけで、故障がユーザーから見えなくなるよ。" },
]},
{ id:"7-3", grade:7, chapter:"せんこうか だい11しょう", title:"可用性と稼働率の計算", teacher:"lb_kuma", teacherName:"ろーどばらんさーくま先輩",
slides:[
{ heading:"MTBFと MTTR", body:"システムの「止まりにくさ」を数字で語るための2つの指標。\n\nMTBF:故障と故障の間の平均時間(平均してどれくらい元気に動き続けるか)\nMTTR:故障してから直るまでの平均時間(平均修理時間)\n\n元気な時間が長く、修理が短いほど 優秀です。", note:"Between Failures と To Repair。英語の意味で覚えると忘れないクマ。" },
{ heading:"稼働率の 計算式", body:"稼働率 = MTBF ÷ (MTBF + MTTR)\n\nれい:MTBF 90時間、MTTR 10時間なら\n90 ÷ (90+10) = 0.9 = 90%\n\n全体の時間のうち、動いていた時間の割合です。", note:"FE試験の頻出計算。式の形をそのまま覚えるクマ。" },
{ heading:"直列と並列", body:"機器を組み合わせたときの稼働率。\n\n直列(両方動いてやっと動く):かけ算\n0.9 × 0.9 = 0.81(下がる!)\n\n並列(どちらか動けばOK=冗長化):\n1 - (両方壊れる確率) = 1 - 0.1×0.1 = 0.99(上がる!)\n\n7-1の冗長化の効果が、数字ではっきり見えます。", note:"並列の式は「1引く、壊れ×壊れ」。呪文として覚えるクマ。" },
],
quiz:[
{ q:"故障と故障の間の平均時間は?", choices:["MTBF","MTTR","MVP"], answer:0, exp:"Mean Time Between Failures。元気に動き続ける平均時間だよ。" },
{ q:"故障から復旧までの平均時間は?", choices:["MTTR","MTBF","MTG"], answer:0, exp:"Mean Time To Repair。平均修理時間だよ。" },
{ q:"稼働率の計算式は?", choices:["MTBF÷(MTBF+MTTR)","MTTR÷MTBF","MTBF×MTTR"], answer:0, exp:"全時間のうち動いていた割合。式ごと覚えよう。" },
{ q:"MTBF 90時間・MTTR 10時間の稼働率は?", choices:["90%","80%","9%"], answer:0, exp:"90÷(90+10)=0.9。90%だよ。" },
{ q:"稼働率0.9の機器を直列につなぐと全体は?", choices:["0.81に下がる","0.99に上がる","変わらない"], answer:0, exp:"直列はかけ算。0.9×0.9=0.81。直列は弱くなるよ。" },
{ q:"稼働率0.9の機器を並列(冗長化)にすると全体は?", choices:["0.99に上がる","0.81に下がる","0.5になる"], answer:0, exp:"1-(0.1×0.1)=0.99。冗長化の効果が数字でわかるね。" },
]},
{ id:"7-4", grade:7, chapter:"せんこうか だい12しょう", title:"VPNで安全な通り道を作る", teacher:"angouneko", teacherName:"あんごうねこ先生",
slides:[
{ heading:"公道の上に 専用トンネル", body:"はなれた拠点や 自宅から、会社のネットワークに安全につなぎたい。\n\n専用線を引けば安全だけど、超高額。\n\nそこで、みんなが使うインターネット(公道)の上に、暗号化された仮想の専用トンネルを作る。これが VPN(仮想専用線)です。", note:"公道を走るけど、中身は装甲車。それがVPNのイメージにゃ。" },
{ heading:"トンネルの中身", body:"VPNでは、送るデータを暗号化して、さらに別の封筒に入れて運びます(カプセル化)。\n\n途中でだれかが拾っても、中身は読めないし、本当の宛先もわからない。\n\n4年生で学んだ暗号技術が、通り道まるごとを守っているのです。", note:"手紙を金庫に入れて、金庫ごと配達するイメージにゃ。" },
{ heading:"VPNの 使いどころ", body:"拠点間VPN:本社と支社のネットワークを常時つなぐ\nリモートアクセスVPN:自宅や外出先から社内へつなぐ\n\nテレワークを支える技術として大活躍。\n\nただしVPNの入り口(認証)が破られると、社内まで一直線。多要素認証(4-6)との併用が鉄則です。", note:"どこでもドアは便利。だからこそ、ドアの鍵は厳重ににゃ。" },

function CharacterSVG({ id, size = 96 }) {
  return (
    <svg
      width={size}
      height={size}
      viewBox="0 0 100 100"
      style={{ display: "block" }}
      dangerouslySetInnerHTML={{ __html: CHAR_ART[id] || "" }}
    />
  );
}

function Silhouette({ size = 96 }) {
  return (
    <svg
      width={size}
      height={size}
      viewBox="0 0 100 100"
      dangerouslySetInnerHTML={{ __html: CHAR_ART._silhouette }}
    />
  );
}

function Acorn({ size = 110, shaking, cracked }) {
  return (
    <svg
      width={size}
      height={size}
      viewBox="0 0 100 100"
      className={shaking ? "acorn-shake" : ""}
      dangerouslySetInnerHTML={{ __html: cracked ? CHAR_ART._acorn_cracked : CHAR_ART._acorn }}
    />
  );
}

/* ================= 共通UI ================= */

function CoinBadge({ coins }) {
  return (
    <div className="coin-badge">
      <svg width="22" height="22" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="#E8B84B" stroke="#5B4636" strokeWidth="2" />
        <text x="12" y="16.5" fontSize="12" textAnchor="middle" fill="#5B4636" fontWeight="bold">木</text>
      </svg>
      <span>{coins}</span>
    </div>
  );
}

function RarityTag({ rarity }) {
  const info = RARITY_INFO[rarity];
  return (
    <span className="rarity-tag" style={{ background: info.color }}>
      {info.label}
    </span>
  );
}

/* ================= 画面 ================= */

function App() {
  const [screen, setScreen] = useState("home");
  const [coins, setCoins] = useState(0);
  const [owned, setOwned] = useState({}); // id -> count
  const [currentChapterId, setCurrentChapterId] = useState(CHAPTERS[0].id);
  const [selectedGrade, setSelectedGrade] = useState(1);
  const [lessonDoneMap, setLessonDoneMap] = useState({}); // chapterId -> bool
  const [bestScoreMap, setBestScoreMap] = useState({}); // chapterId -> number
  const [ssrGranted, setSsrGranted] = useState(false); // 卒業認定SSRを受け取ったか
  const [grantedSSR, setGrantedSSR] = useState(null); // 今回のテストで授与されたSSR

  const chapter = CHAPTERS.find((c) => c.id === currentChapterId);
  const lessonDone = !!lessonDoneMap[currentChapterId];
  const bestScore = bestScoreMap[currentChapterId] ?? null;

  // 授業
  const [slideIdx, setSlideIdx] = useState(0);

  // クイズ
  const [quizIdx, setQuizIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [correctCount, setCorrectCount] = useState(0);

  // ガチャ
  const [gachaPhase, setGachaPhase] = useState("idle"); // idle | shaking | reveal
  const [gachaResult, setGachaResult] = useState(null);
  const [wasDup, setWasDup] = useState(false);

  const ownedUnique = Object.keys(owned).length;

  /* ---- クイズ ---- */
  const [quizSet, setQuizSet] = useState([]); // 選択肢シャッフル済みの出題セット

  const startQuiz = () => {
    // 各問題の選択肢を出題ごとにシャッフル(正解位置のかたよりを防ぐ)
    const shuffled = chapter.quiz.map((q) => {
      const idx = q.choices.map((_, i) => i);
      for (let i = idx.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [idx[i], idx[j]] = [idx[j], idx[i]];
      }
      return {
        ...q,
        choices: idx.map((k) => q.choices[k]),
        answer: idx.indexOf(q.answer),
      };
    });
    setQuizSet(shuffled);
    setQuizIdx(0);
    setPicked(null);
    setCorrectCount(0);
    setScreen("quiz");
  };

  const pick = (i) => {
    if (picked !== null) return;
    setPicked(i);
    if (i === quizSet[quizIdx].answer) setCorrectCount((c) => c + 1);
  };

  const nextQuestion = () => {
    if (quizIdx + 1 < chapter.quiz.length) {
      setQuizIdx((i) => i + 1);
      setPicked(null);
    } else {
      const finalCorrect = correctCount;
      const perfect = finalCorrect === chapter.quiz.length;
      const cheer = ownedUnique; // なかまのおうえんボーナス
      const earned = finalCorrect * COIN_PER_CORRECT + (perfect ? PERFECT_BONUS : 0) + cheer;
      setCoins((c) => c + earned);
      setBestScoreMap((m) => ({
        ...m,
        [currentChapterId]: m[currentChapterId] == null ? finalCorrect : Math.max(m[currentChapterId], finalCorrect),
      }));
      // そつぎょう認定試験: 8割以上の初回合格でSSR確定1匹プレゼント
      setGrantedSSR(null);
      if (chapter.graduation && !ssrGranted && finalCorrect >= Math.ceil(chapter.quiz.length * GRAD_PASS_RATIO)) {
        const srPool = CHARACTERS.filter((c) => c.rarity === "SR");
        const notOwned = srPool.filter((c) => !owned[c.id]);
        const prize = (notOwned.length > 0 ? notOwned : srPool)[
          Math.floor(Math.random() * (notOwned.length > 0 ? notOwned.length : srPool.length))
        ];
        setOwned((o) => ({ ...o, [prize.id]: (o[prize.id] || 0) + 1 }));
        setSsrGranted(true);
        setGrantedSSR(prize);
      }
      setScreen("result");
    }
  };

  /* ---- ガチャ ---- */
  const rollGacha = () => {
    if (coins < GACHA_COST || gachaPhase !== "idle") return;
    setCoins((c) => c - GACHA_COST);
    setGachaPhase("shaking");
    const r = Math.random();
    const rarity = r < 0.1 ? "SR" : r < 0.45 ? "R" : "N";
    const pool = CHARACTERS.filter((c) => c.rarity === rarity);
    const result = pool[Math.floor(Math.random() * pool.length)];
    setTimeout(() => {
      setGachaResult(result);
      setWasDup(!!owned[result.id]);
      setOwned((o) => ({ ...o, [result.id]: (o[result.id] || 0) + 1 }));
      if (owned[result.id]) setCoins((c) => c + DUP_REFUND);
      setGachaPhase("reveal");
    }, 1400);
  };

  const resetGacha = () => {
    setGachaPhase("idle");
    setGachaResult(null);
    setWasDup(false);
  };

  /* ---- 画面ごとの描画 ---- */

  const quizLen = chapter.quiz.length;
  const rank =
    correctCount === quizLen ? "S" : correctCount >= quizLen - 1 ? "A" : correctCount >= quizLen - 2 ? "B" : "C";
  const earnedCoins =
    correctCount * COIN_PER_CORRECT + (correctCount === quizLen ? PERFECT_BONUS : 0) + ownedUnique;

  return (
    <div className="app">
      <style>{CSS}</style>

      {/* ヘッダー */}
      <header className="header">
        <button className="logo-btn" onClick={() => { setScreen("home"); resetGacha(); }}>
          ネットのもりの がっこう
        </button>
        <CoinBadge coins={coins} />
      </header>

      {/* ホーム */}
      {screen === "home" && (
        <main className="main">
          <div className="signboard">
            <div className="signboard-title">ようこそ、しんにゅうせい!</div>
            <div className="signboard-sub">
              じゅぎょうを うけて、テストで 木のみコインを あつめよう。<br />
              コインで どんぐりガチャが ひけるよ。
            </div>
          </div>

          <div className="home-chars">
            <CharacterSVG id="pingoro" size={68} />
            <CharacterSVG id="paketto" size={76} />
            <CharacterSVG id="lb_kuma" size={72} />
            <CharacterSVG id="dnsjii" size={68} />
          </div>

          <div className="chapter-select">
            <div className="chapter-select-label">がくしゅうする しょうを えらぶ</div>
            <div className="grade-tabs">
              {GRADES.map((g) => {
                const gc = CHAPTERS.filter((c) => c.grade === g.key);
                const done = gc.filter((c) => bestScoreMap[c.id] != null).length;
                return (
                  <button
                    key={g.key}
                    className={`grade-tab ${g.key === selectedGrade ? "active" : ""}`}
                    onClick={() => {
                      setSelectedGrade(g.key);
                      const first = gc[0];
                      if (first && !gc.some((c) => c.id === currentChapterId)) setCurrentChapterId(first.id);
                    }}
                  >
                    {g.label}
                    <span className="grade-progress">{done}/{gc.length}</span>
                  </button>
                );
              })}
            </div>
            <div className="chapter-chips">
              {CHAPTERS.filter((c) => c.grade === selectedGrade).map((c) => (
                <button
                  key={c.id}
                  className={`chapter-chip ${c.id === currentChapterId ? "active" : ""}`}
                  onClick={() => setCurrentChapterId(c.id)}
                >
                  <span className="chip-chapter">{c.chapter}</span>
                  <span className="chip-title">{c.title}</span>
                  {bestScoreMap[c.id] != null && (
                    <span className="chip-score">さいこう {bestScoreMap[c.id]}/{c.quiz.length}</span>
                  )}
                </button>
              ))}
            </div>
          </div>

          <div className="menu">
            <button
              className="menu-btn lesson"
              onClick={() => { setSlideIdx(0); setScreen("lesson"); }}
              disabled={chapter.quizOnly}
            >
              <span className="menu-emoji">📖</span>
              <span className="menu-label">じゅぎょう</span>
              <span className="menu-desc">
                {chapter.quizOnly ? "そつぎょうゾーンは テストのみ!" : `${chapter.chapter}「${chapter.title}」`}
              </span>
            </button>
            <button
              className="menu-btn quiz"
              onClick={startQuiz}
              disabled={!lessonDone && !chapter.quizOnly}
            >
              <span className="menu-emoji">{chapter.graduation ? "🎓" : "✏️"}</span>
              <span className="menu-label">{chapter.quizOnly ? chapter.title : "しょうテスト"}</span>
              <span className="menu-desc">
                {chapter.graduation && !ssrGranted
                  ? `8わり合格で SRなかま確定! (${chapter.quiz.length}問)`
                  : lessonDone || chapter.quizOnly
                  ? bestScore !== null
                    ? `さいこうきろく: ${bestScore} / ${chapter.quiz.length} 問`
                    : `${chapter.quiz.length}問クイズで コインをゲット!`
                  : "さきに じゅぎょうを うけよう"}
              </span>
            </button>
            <button className="menu-btn gacha" onClick={() => { resetGacha(); setScreen("gacha"); }}>
              <span className="menu-emoji">🌰</span>
              <span className="menu-label">どんぐりガチャ</span>
              <span className="menu-desc">コイン {GACHA_COST}まいで 1かい</span>
            </button>
            <button className="menu-btn zukan" onClick={() => setScreen("zukan")}>
              <span className="menu-emoji">📔</span>
              <span className="menu-label">なかまずかん</span>
              <span className="menu-desc">{ownedUnique} / {CHARACTERS.length} ひき</span>
            </button>
          </div>

          {ownedUnique > 0 && (
            <div className="cheer-note">
              なかまが {ownedUnique}ひき おうえん中! テストのコインが +{ownedUnique}まい ふえるよ
            </div>
          )}
        </main>
      )}

      {/* 授業 */}
      {screen === "lesson" && (
        <main className="main">
          <div className="chapter-label">{chapter.chapter}</div>
          <h1 className="lesson-title">{chapter.title}</h1>

          <div className="lesson-card">
            <div className="teacher">
              <CharacterSVG id={chapter.teacher} size={84} />
              <div className="teacher-name">{chapter.teacherName}</div>
            </div>
            <div className="lesson-slide">
              <h2>{chapter.slides[slideIdx].heading}</h2>
              <p className="lesson-body">{chapter.slides[slideIdx].body}</p>
              <div className="lesson-note">🌱 {chapter.slides[slideIdx].note}</div>
            </div>
          </div>

          <div className="slide-dots">
            {chapter.slides.map((_, i) => (
              <span key={i} className={`dot ${i === slideIdx ? "active" : ""}`} />
            ))}
          </div>

          <div className="lesson-nav">
            <button
              className="btn ghost"
              onClick={() => setSlideIdx((i) => Math.max(0, i - 1))}
              disabled={slideIdx === 0}
            >
              ← もどる
            </button>
            {slideIdx < chapter.slides.length - 1 ? (
              <button className="btn primary" onClick={() => setSlideIdx((i) => i + 1)}>
                つぎへ →
              </button>
            ) : (
              <button
                className="btn primary"
                onClick={() => {
                  setLessonDoneMap((m) => ({ ...m, [currentChapterId]: true }));
                  startQuiz();
                }}
              >
                しょうテストに ちょうせん!
              </button>
            )}
          </div>
        </main>
      )}


      {/* クイズ */}
      {screen === "quiz" && (
        <main className="main">
          <div className="quiz-progress">
            だい {quizIdx + 1} もん / {chapter.quiz.length} もん
          </div>
          <div className="quiz-card">
            <div className="quiz-q">{quizSet[quizIdx].q}</div>
            <div className="quiz-choices">
              {quizSet[quizIdx].choices.map((c, i) => {
                let cls = "choice";
                if (picked !== null) {
                  if (i === quizSet[quizIdx].answer) cls += " correct";
                  else if (i === picked) cls += " wrong";
                  else cls += " dim";
                }
                return (
                  <button key={i} className={cls} onClick={() => pick(i)}>
                    {c}
                  </button>
                );
              })}
            </div>

            {picked !== null && (
              <div className={`quiz-feedback ${picked === quizSet[quizIdx].answer ? "ok" : "ng"}`}>
                <div className="feedback-head">
                  {picked === quizSet[quizIdx].answer ? "せいかい! 🎉" : "ざんねん…"}
                </div>
                <div className="feedback-exp">{quizSet[quizIdx].exp}</div>
                <button className="btn primary" onClick={nextQuestion}>
                  {quizIdx + 1 < chapter.quiz.length ? "つぎのもんだいへ" : "けっかを みる"}
                </button>
              </div>
            )}
          </div>

          {ownedUnique > 0 && (
            <div className="cheer-row">
              {Object.keys(owned).slice(0, 5).map((id) => (
                <div key={id} className="cheer-chibi">
                  <CharacterSVG id={id} size={44} />
                </div>
              ))}
              <span className="cheer-text">がんばれ〜</span>
            </div>
          )}
        </main>
      )}

      {/* 結果 */}
      {screen === "result" && (
        <main className="main">
          <div className="result-card">
            <div className="result-rank" data-rank={rank}>{rank}</div>
            <div className="result-score">
              {correctCount} / {chapter.quiz.length} 問 せいかい!
            </div>
            <div className="result-coins">
              <div>せいかいボーナス: {correctCount * COIN_PER_CORRECT}まい</div>
              {correctCount === chapter.quiz.length && <div>ぜんもんせいかい: +{PERFECT_BONUS}まい</div>}
              {ownedUnique > 0 && <div>なかまのおうえん: +{ownedUnique}まい</div>}
              <div className="result-total">ごうけい {earnedCoins}まい ゲット!</div>
            </div>
            {grantedSSR && (
              <div className="grad-prize">
                <div className="grad-prize-title">🎓 そつぎょう おめでとう!</div>
                <CharacterSVG id={grantedSSR.id} size={110} />
                <RarityTag rarity={grantedSSR.rarity} />
                <div className="reveal-name">{grantedSSR.name}</div>
                <div className="grad-prize-note">とくべつに なかまに くわわったよ!</div>
              </div>
            )}
            {chapter.graduation && !grantedSSR && correctCount < Math.ceil(chapter.quiz.length * GRAD_PASS_RATIO) && (
              <div className="result-hint">合格ラインは {Math.ceil(chapter.quiz.length * GRAD_PASS_RATIO)}問! ふくしゅうして もういちど!</div>
            )}
            {rank !== "S" && !chapter.graduation && (
              <div className="result-hint">S評価(ぜんもんせいかい)を めざして もういちど!</div>
            )}
            <div className="result-btns">
              <button className="btn primary" onClick={() => { resetGacha(); setScreen("gacha"); }}>
                ガチャを ひきにいく
              </button>
              <button className="btn ghost" onClick={startQuiz}>もういちど テスト</button>
              <button className="btn ghost" onClick={() => setScreen("home")}>がっこうに もどる</button>
            </div>
          </div>
        </main>
      )}

      {/* ガチャ */}
      {screen === "gacha" && (
        <main className="main">
          <h1 className="page-title">どんぐりガチャ</h1>

          {gachaPhase !== "reveal" && (
            <div className="gacha-stage">
              <Acorn shaking={gachaPhase === "shaking"} cracked={false} />
              <div className="gacha-cost">1かい = コイン {GACHA_COST}まい</div>
              <button
                className="btn primary big"
                onClick={rollGacha}
                disabled={coins < GACHA_COST || gachaPhase === "shaking"}
              >
                {gachaPhase === "shaking" ? "どんぐりが ふるえている…" : "ガチャを ひく!"}
              </button>
              {coins < GACHA_COST && gachaPhase === "idle" && (
                <div className="gacha-hint">コインがたりないよ。テストで あつめよう!</div>
              )}
            </div>
          )}

          {gachaPhase === "reveal" && gachaResult && (
            <div className="gacha-stage reveal">
              <div className="reveal-char">
                <CharacterSVG id={gachaResult.id} size={130} />
              </div>
              <RarityTag rarity={gachaResult.rarity} />
              <div className="reveal-name">{gachaResult.name}</div>
              <div className="reveal-role">{gachaResult.role}</div>
              <div className="reveal-desc">{gachaResult.desc}</div>
              {wasDup && (
                <div className="dup-note">
                  もう なかまだったので、木のみコイン {DUP_REFUND}まいに かわったよ
                </div>
              )}
              <div className="result-btns">
                <button className="btn primary" onClick={resetGacha} disabled={coins < GACHA_COST}>
                  もういちど ひく({GACHA_COST}まい)
                </button>
                <button className="btn ghost" onClick={() => setScreen("zukan")}>ずかんを みる</button>
                <button className="btn ghost" onClick={() => setScreen("home")}>がっこうに もどる</button>
              </div>
            </div>
          )}

          <div className="gacha-rates">
            でやすさ: N…55% / R…35% / SR…10%
          </div>
        </main>
      )}

      {/* ずかん */}
      {screen === "zukan" && (
        <main className="main">
          <h1 className="page-title">なかまずかん({ownedUnique} / {CHARACTERS.length})</h1>
          <div className="zukan-grid">
            {CHARACTERS.map((c) => {
              const has = !!owned[c.id];
              return (
                <div key={c.id} className={`zukan-card ${has ? "" : "locked"}`}>
                  {has ? <CharacterSVG id={c.id} size={88} /> : <Silhouette size={88} />}
                  <div className="zukan-name">{has ? c.name : "???"}</div>
                  <RarityTag rarity={c.rarity} />
                  {has && <div className="zukan-role">{c.role}</div>}
                  {has && <div className="zukan-desc">{c.desc}</div>}
                  {has && owned[c.id] > 1 && <div className="zukan-count">×{owned[c.id]}</div>}
                </div>
              );
            })}
          </div>
          <button className="btn ghost" onClick={() => setScreen("home")}>がっこうに もどる</button>
        </main>
      )}

      <footer className="footer">
        プロトタイプ版:とじると すすみは リセットされます
      </footer>
    </div>
  );
}

  gap: 3px;
  text-align: left;
  min-width: 150px;
  background: #FDF8E7;
  border: 2px solid #C9BC96;
  border-radius: 14px 16px 14px 18px;
  padding: 8px 12px;
  cursor: pointer;
  color: #4A3B2E;
}
.chapter-chip.active {
  border-color: #4E7A46;
  background: #EDF3E2;
}
.chapter-chip:focus-visible { outline: 3px solid #4E7A46; outline-offset: 2px; }
.chip-chapter { font-size: 10.5px; font-weight: 700; color: #C4652E; }
.chip-title { font-size: 12.5px; font-weight: 900; }
.chip-score { font-size: 10.5px; color: #4E7A46; font-weight: 700; }

.cheer-note {
  font-size: 13px;
  background: #E4EED8;
  border-radius: 999px;
  padding: 6px 16px;
  color: #4E7A46;
  font-weight: 700;
}

.chapter-label { font-size: 13px; font-weight: 700; color: #C4652E; }
.lesson-title { font-size: 20px; font-weight: 900; text-align: center; }
.page-title { font-size: 20px; font-weight: 900; }

.lesson-card {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.teacher { display: flex; align-items: center; gap: 8px; }
.teacher-name { font-size: 13px; font-weight: 700; }
.lesson-slide {
  background: #FDF8E7;
  border: 2.5px solid #5B4636;
  border-radius: 20px 24px 22px 18px;
  padding: 20px;
  box-shadow: 3px 3px 0 #D8CBA8;
}
.lesson-slide h2 { font-size: 17px; font-weight: 900; color: #4E7A46; margin-bottom: 12px; }
.lesson-body { font-size: 15px; line-height: 2; white-space: pre-line; }
.lesson-note {
  margin-top: 14px;
  font-size: 12.5px;
  background: #EDF3E2;
  border-radius: 12px;
  padding: 8px 12px;
  color: #4E7A46;
}

.slide-dots { display: flex; gap: 8px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #D8CBA8; }
.dot.active { background: #4E7A46; }

.lesson-nav { display: flex; gap: 12px; }

.btn {
  font-family: inherit;
  font-weight: 900;
  font-size: 15px;
  border-radius: 999px;
  padding: 10px 22px;
  cursor: pointer;
  border: 2.5px solid #5B4636;
  transition: transform 0.12s;
}
.btn:active:not(:disabled) { transform: translate(1px, 2px); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn:focus-visible { outline: 3px solid #C4652E; outline-offset: 2px; }
.btn.primary { background: #6FA05C; color: #FDF8E7; box-shadow: 2px 3px 0 #5B4636; }
.btn.ghost { background: #FDF8E7; color: #5B4636; box-shadow: 2px 3px 0 #D8CBA8; }
.btn.big { font-size: 17px; padding: 13px 30px; }

.quiz-progress { font-size: 13px; font-weight: 700; color: #C4652E; }
.quiz-card {
  width: 100%;
  background: #FDF8E7;
  border: 2.5px solid #5B4636;
  border-radius: 22px 18px 24px 20px;
  padding: 22px 20px;
  box-shadow: 3px 3px 0 #D8CBA8;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.quiz-q { font-size: 17px; font-weight: 900; line-height: 1.7; }
.quiz-choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  text-align: left;
  padding: 12px 16px;
  border-radius: 14px;
  border: 2px solid #5B4636;
  background: #FFFDF4;
  cursor: pointer;
  color: #5B4636;
}
.choice:focus-visible { outline: 3px solid #4E7A46; outline-offset: 2px; }
.choice.correct { background: #DCEBC8; border-color: #4E7A46; }
.choice.wrong { background: #F6D9CE; border-color: #C4652E; }
.choice.dim { opacity: 0.45; }

.quiz-feedback { border-radius: 14px; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
.quiz-feedback.ok { background: #EDF3E2; }
.quiz-feedback.ng { background: #F9EAE2; }
.feedback-head { font-weight: 900; font-size: 15px; }
.feedback-exp { font-size: 13.5px; line-height: 1.8; }

.cheer-row { display: flex; align-items: center; gap: 2px; }
.cheer-chibi { animation: bob 2s ease-in-out infinite; }
.cheer-chibi:nth-child(2) { animation-delay: 0.3s; }
.cheer-chibi:nth-child(3) { animation-delay: 0.6s; }
.cheer-text { font-size: 12px; color: #8A6238; font-weight: 700; margin-left: 6px; }

.result-card {
  width: 100%;
  background: #FDF8E7;
  border: 2.5px solid #5B4636;
  border-radius: 24px 20px 22px 26px;
  padding: 26px 20px;
  box-shadow: 3px 3px 0 #D8CBA8;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  text-align: center;
}
.result-rank {
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
  width: 92px;
  height: 92px;
  border-radius: 50% 46% 52% 48%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px solid #5B4636;
  background: #FFFDF4;
}
.result-rank[data-rank="S"] { background: #F6E3A8; color: #B07C1A; }
.result-rank[data-rank="A"] { background: #DCEBC8; color: #4E7A46; }
.result-rank[data-rank="B"] { background: #D8E6F0; color: #5E7FA6; }
.result-rank[data-rank="C"] { background: #EFE6DA; color: #8A6238; }
.result-score { font-size: 18px; font-weight: 900; }
.result-coins { font-size: 13.5px; line-height: 2; }
.result-total { font-weight: 900; font-size: 16px; color: #C4652E; margin-top: 4px; }
.result-hint { font-size: 12.5px; color: #8A6238; }
.result-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }

.gacha-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  background: #FDF8E7;
  border: 2.5px solid #5B4636;
  border-radius: 24px 22px 20px 26px;
  padding: 28px 24px;
  box-shadow: 3px 3px 0 #D8CBA8;
  width: 100%;
  text-align: center;
}
.acorn-shake { animation: shake 0.35s ease-in-out infinite; }
@keyframes shake {
  0%, 100% { transform: rotate(0); }
  25% { transform: rotate(-7deg) translateX(-2px); }
  75% { transform: rotate(7deg) translateX(2px); }
}
.gacha-cost { font-size: 13.5px; font-weight: 700; }
.gacha-hint { font-size: 12.5px; color: #C4652E; }
.gacha-rates { font-size: 12px; opacity: 0.7; }

.reveal-char { animation: pop 0.5s cubic-bezier(0.2, 1.6, 0.4, 1); }
@keyframes pop {
  0% { transform: scale(0.2); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.reveal-name { font-size: 21px; font-weight: 900; }
.reveal-role { font-size: 13.5px; font-weight: 700; color: #4E7A46; }
.reveal-desc { font-size: 13px; line-height: 1.9; max-width: 340px; }
.dup-note { font-size: 12.5px; background: #F6E3A8; border-radius: 12px; padding: 6px 14px; }

.rarity-tag {
  display: inline-block;
  color: #FDF8E7;
  font-weight: 900;
  font-size: 12px;
  border-radius: 999px;
  padding: 2px 12px;
  border: 2px solid #5B4636;
}

.zukan-grid {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}
.zukan-card {
  position: relative;
  background: #FDF8E7;
  border: 2.5px solid #5B4636;
  border-radius: 18px 22px 20px 18px;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-align: center;
  box-shadow: 2px 2px 0 #D8CBA8;
}
.zukan-card.locked { opacity: 0.75; background: #F2ECD8; }
.zukan-name { font-weight: 900; font-size: 14px; }
.zukan-role { font-size: 11.5px; color: #4E7A46; font-weight: 700; }
.zukan-desc { font-size: 11px; line-height: 1.7; opacity: 0.85; }
.zukan-count {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 12px;
  font-weight: 900;
  color: #8A6238;
}

.footer {
  padding: 10px 16px 24px;
  font-size: 11.5px;
  opacity: 0.6;
}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
